<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Quản lý lịch công tác HQKV8</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy:   #063a63;
      --navy2:  #0f4c81;
      --blue:   #0f4c81;
      --blue2:  #0b67b2;
      --blue3:  #38a3d1;
      --gold:   #c89a00;
      --gold2:  #f0c040;
      --bg:     #f7f9fc;
      --bg2:    #eef4fb;
      --card:   #fff;
      --text:   #1f2933;
      --text2:  #3d5166;
      --muted:  #5f6b76;
      --border: #d9e3ec;
      --border2:#e6eef6;
      --red:    #b3261e;
      --green:  #0b7a4b;
      --orange: #b76b00;
      --sidebar-w: 252px;
      --shadow-sm: 0 2px 8px rgba(6,58,99,.07);
      --shadow: 0 8px 24px rgba(6,58,99,.11);
      --shadow-lg: 0 20px 56px rgba(6,58,99,.17);
      --r: 12px;
      --r-sm: 9px;
      --r-xs: 6px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: "Be Vietnam Pro", "Segoe UI", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
    }
    button, input, select, textarea { font: inherit; }
    button { cursor: pointer; }
    a { color: var(--blue); text-decoration: none; }

    .hide { display: none !important; }
    .muted { color: var(--muted); }
    .mono { font-family: "JetBrains Mono", Consolas, monospace; font-size: .82em; }
    .nowrap { white-space: nowrap; }
    .bold { font-weight: 700; }

    /* ===== SCROLLBAR ===== */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

    /* ===== LOGIN ===== */
    .login-wrap {
      min-height: 100svh;
      display: grid;
      place-items: center;
      padding: 20px;
      background: linear-gradient(145deg, #031d38 0%, #063a63 45%, #0f6fb0 80%, #063a63 100%);
      position: relative;
      overflow: hidden;
    }
    .login-wrap::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 60% 50% at 70% 30%, rgba(45,120,239,.22) 0%, transparent 70%),
                  radial-gradient(ellipse 40% 60% at 10% 80%, rgba(212,160,23,.12) 0%, transparent 60%);
      pointer-events: none;
    }
    .login-wrap::after {
      content: '';
      position: absolute;
      width: 500px; height: 500px;
      border: 1px solid rgba(255,255,255,.06);
      border-radius: 50%;
      top: -100px; right: -100px;
      pointer-events: none;
    }
    .login-card {
      width: min(420px, 100%);
      background: rgba(255,255,255,.97);
      border-radius: 22px;
      box-shadow: 0 32px 80px rgba(0,0,0,.35), 0 0 0 1px rgba(255,255,255,.15);
      overflow: hidden;
      position: relative;
      z-index: 1;
      animation: fadeUp .45s ease;
    }
    @keyframes fadeUp { from { opacity:0; transform:translateY(20px) } to { opacity:1; transform:none } }
    .login-banner {
      padding: 30px 28px 22px;
      background: linear-gradient(135deg, #063a63 0%, #0b67b2 100%);
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .login-banner::after {
      content: '';
      position: absolute;
      width: 200px; height: 200px;
      border-radius: 50%;
      background: rgba(255,255,255,.05);
      top: -60px; right: -40px;
    }
    .login-logo {
      width: 82px; height: 82px;
      object-fit: contain;
      display: block;
      margin: 0 auto 14px;
      filter: drop-shadow(0 4px 14px rgba(0,0,0,.35));
      position: relative;
      z-index: 1;
    }
    .login-banner .line1 {
      font-size: .82rem;
      font-weight: 600;
      color: rgba(255,255,255,.85);
      text-transform: uppercase;
      letter-spacing: .8px;
      margin: 0 0 3px;
      position: relative;
      z-index: 1;
    }
    .login-banner .line2 {
      font-size: .82rem;
      font-weight: 700;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: .5px;
      margin: 0 0 10px;
      position: relative;
      z-index: 1;
      line-height: 1.35;
    }
    .login-banner .line3 {
      font-size: 1.23rem;
      font-weight: 800;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: .6px;
      line-height: 1.3;
      position: relative;
      z-index: 1;
      margin: 0;
      text-shadow: 0 2px 10px rgba(0,0,0,.3);
    }
    .login-divider {
      height: 3px;
      background: linear-gradient(90deg, var(--gold) 0%, var(--gold2) 50%, var(--gold) 100%);
    }
    .login-body { padding: 26px 28px 30px; }
    .field { margin-bottom: 16px; }
    .field label {
      display: block;
      font-size: .72rem;
      font-weight: 700;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: .5px;
      margin-bottom: 7px;
    }
    .field input, .field select, .field textarea {
      width: 100%;
      border: 1.5px solid var(--border);
      border-radius: var(--r-sm);
      padding: 11px 13px;
      background: #fafbff;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
      color: var(--text);
    }
    .field textarea { min-height: 80px; resize: vertical; }
    .field input:focus, .field select:focus, .field textarea:focus {
      border-color: var(--blue2);
      box-shadow: 0 0 0 3px rgba(45,120,239,.14);
      background: #fff;
    }
    .field input[readonly] { background: var(--bg2); color: var(--muted); }
    .field .hint { font-size: .72rem; color: var(--muted); margin-top: 5px; }

    /* ===== BUTTONS ===== */
    .btn {
      border: none;
      border-radius: var(--r-sm);
      padding: 10px 16px;
      font-weight: 600;
      font-size: .88rem;
      background: var(--bg2);
      color: var(--text2);
      transition: all .18s;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      white-space: nowrap;
    }
    .btn:hover { filter: brightness(.96); transform: translateY(-1px); }
    .btn:active { transform: none; filter: brightness(.9); }
    .btn.primary {
      background: linear-gradient(135deg, var(--blue), var(--blue2));
      color: #fff;
      box-shadow: 0 6px 18px rgba(11,103,178,.26);
    }
    .btn.primary:hover { box-shadow: 0 8px 22px rgba(21,86,200,.36); }
    .btn.danger { background: #fee2e2; color: #991b1b; }
    .btn.warn { background: #fff7ed; color: #9a3412; }
    .btn.ok { background: #dcfce7; color: #166534; }
    .btn.ghost { background: transparent; border: 1.5px solid var(--border); }
    .btn.sm { padding: 7px 11px; font-size: .8rem; border-radius: var(--r-xs); }
    .btn.xs { padding: 4px 8px; font-size: .75rem; border-radius: 6px; }
    .btn.full { width: 100%; justify-content: center; }
    .btn:disabled { opacity: .55; pointer-events: none; }

    /* ===== MESSAGES ===== */
    .msg {
      margin-top: 12px;
      padding: 10px 14px;
      border-radius: var(--r-sm);
      background: var(--bg2);
      color: var(--text2);
      font-size: .88rem;
      border-left: 3px solid var(--border);
    }
    .msg.err { background: #fef2f2; color: #991b1b; border-color: var(--red); }
    .msg.ok { background: #f0fdf4; color: #166534; border-color: var(--green); }

    /* ===== LAYOUT ===== */
    .layout { display: flex; min-height: 100svh; }

    /* ===== SIDEBAR ===== */
    .sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      background: linear-gradient(180deg, #063a63 0%, #0b5a96 55%, #063a63 100%);
      color: #fff;
      position: sticky;
      top: 0;
      height: 100svh;
      display: flex;
      flex-direction: column;
      z-index: 30;
      border-right: 1px solid rgba(255,255,255,.06);
    }
    .brand {
      padding: 20px 18px 16px;
      border-bottom: 1px solid rgba(255,255,255,.1);
      display: flex;
      align-items: center;
      gap: 11px;
    }
    .brand-logo { width: 40px; height: 40px; object-fit: contain; flex-shrink: 0; filter: drop-shadow(0 2px 6px rgba(0,0,0,.3)); }
    .brand-text h2 {
      font-size: .78rem;
      font-weight: 800;
      line-height: 1.3;
      text-transform: uppercase;
      letter-spacing: .4px;
    }
    .brand-text p { font-size: .68rem; color: rgba(255,255,255,.55); margin-top: 2px; }
    .nav { padding: 14px 10px; flex: 1; overflow-y: auto; }
    .nav-section-label {
      font-size: .65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .8px;
      color: rgba(255,255,255,.42);
      padding: 10px 10px 5px;
    }
    .nav-btn {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 10px;
      border: none;
      background: transparent;
      color: rgba(255,255,255,.7);
      padding: 10px 12px;
      border-radius: var(--r-sm);
      text-align: left;
      font-weight: 500;
      font-size: .88rem;
      margin-bottom: 2px;
      transition: all .18s;
      position: relative;
    }
    .nav-btn .nav-icon { font-size: 1.1rem; width: 22px; text-align: center; flex-shrink: 0; }
    .nav-btn .nav-label { flex: 1; }
    .nav-btn .badge {
      background: var(--gold2);
      color: #0b1f45;
      border-radius: 99px;
      padding: 1px 7px;
      font-size: .7rem;
      font-weight: 800;
    }
    .nav-btn:hover { background: rgba(255,255,255,.1); color: #fff; }
    .nav-btn.active {
      background: rgba(255,255,255,.15);
      color: #fff;
      font-weight: 700;
    }
    .nav-btn.active::before {
      content: '';
      position: absolute;
      left: 0; top: 50%;
      transform: translateY(-50%);
      width: 3px; height: 60%;
      background: var(--gold2);
      border-radius: 0 3px 3px 0;
      box-shadow: 0 0 8px rgba(240,192,64,.5);
    }
    .side-foot {
      padding: 14px 10px;
      border-top: 1px solid rgba(255,255,255,.1);
    }
    .userbox {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,.08);
      border-radius: var(--r-sm);
      padding: 10px 12px;
      cursor: default;
    }
    .avatar {
      width: 34px; height: 34px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      color: #0b1f45;
      font-weight: 900;
      font-size: .85rem;
      flex-shrink: 0;
    }
    .userbox-info b { display: block; font-size: .84rem; line-height: 1.2; }
    .userbox-info span { font-size: .7rem; color: rgba(255,255,255,.6); }
    .side-actions { display: flex; gap: 6px; margin-top: 10px; }
    .side-actions button {
      flex: 1;
      border: none;
      border-radius: var(--r-xs);
      padding: 7px;
      font-size: .75rem;
      font-weight: 600;
      background: rgba(255,255,255,.1);
      color: rgba(255,255,255,.8);
      transition: background .18s;
    }
    .side-actions button:hover { background: rgba(255,255,255,.18); color: #fff; }
    .side-actions button.logout-btn { background: rgba(220,50,50,.2); color: #fca5a5; }
    .side-actions button.logout-btn:hover { background: rgba(220,50,50,.35); }

    /* ===== MAIN ===== */
    .main { flex: 1; min-width: 0; display: flex; flex-direction: column; }

    /* ===== TOPBAR ===== */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(247,249,252,.93);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border2);
      padding: 12px 22px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .topbar-inner { flex: 1; min-width: 0; }
    .topbar-title { margin:0; font-size:.98rem; font-weight:800; text-transform:uppercase; letter-spacing:.5px; color:var(--navy); }
    .topbar-sub { margin:1px 0 0; font-size:.75rem; color:var(--muted); }
    .topbar-mobile-title { display:none; align-items:center; justify-content:flex-start; gap:8px; }
    .topbar-mobile-title span { font-size:1rem; font-weight:800; text-transform:uppercase; letter-spacing:.4px; color:var(--navy); }
    .topbar-logo { height:1.15rem; width:auto; object-fit:contain; filter:drop-shadow(0 1px 3px rgba(0,0,0,.2)); flex-shrink:0; }
    .hamb {
      display: none;
      border: 1.5px solid var(--border);
      background: #fff;
      border-radius: var(--r-xs);
      padding: 7px 9px;
      font-size: 1rem;
      color: var(--text2);
    }
    .page-title h1 {
      font-size: .98rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: var(--navy);
    }
    .page-title p { font-size: .75rem; color: var(--muted); margin-top: 1px; }
    .topbar-actions { margin-left: auto; display: flex; gap: 7px; align-items: center; }

    /* ===== CONTENT ===== */
    .content { padding: 20px 22px; flex: 1; }

    /* ===== STAT CARDS ===== */
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
    .stat-card {
      background: #fff;
      border-radius: var(--r);
      padding: 16px 18px;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border2);
      position: relative;
      overflow: hidden;
      transition: transform .18s, box-shadow .18s;
    }
    .stat-card:hover { transform: translateY(-2px); box-shadow: var(--shadow); border-color: #c4d6ea; }
    .stat-active {
      box-shadow: inset 0 0 0 1px rgba(15,76,129,.20), var(--shadow-sm) !important;
      border-color: rgba(15,76,129,.22) !important;
      transform: none;
    }
    .th-active,.td-active { background: #eff6ff !important; color: var(--blue) !important; font-weight:800; }
    .stat-card::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--blue), var(--blue2));
    }
    .stat-card:nth-child(2)::after { background: linear-gradient(90deg, #6c35c8, #9c5fef); }
    .stat-card:nth-child(3)::after { background: linear-gradient(90deg, #059669, #10b981); }
    .stat-card:nth-child(4)::after { background: linear-gradient(90deg, var(--gold), var(--gold2)); }
    .stat-k { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
    .stat-v { font-size: 2rem; font-weight: 900; color: var(--navy); line-height: 1.1; margin: 5px 0 3px; }
    .stat-sub { font-size: .72rem; color: var(--muted); }
    .stat-card.stat-today { background: linear-gradient(180deg,#fff 0%,#f8fbff 100%); }
    .stat-card.stat-week  { background: linear-gradient(180deg,#fff 0%,#fbf8ff 100%); }
    .stat-card.stat-month { background: linear-gradient(180deg,#fff 0%,#f5fff9 100%); }
    .stat-card.stat-year  { background: linear-gradient(180deg,#fff 0%,#fffdf3 100%); }
    .stat-card.stat-total::after { background: linear-gradient(90deg,#0f4c81,#0b67b2); }
    .stat-card.stat-published::after { background: linear-gradient(90deg,#059669,#10b981); }
    .stat-card.stat-draft::after { background: linear-gradient(90deg,#6c35c8,#9c5fef); }
    .stat-card.stat-cancelled::after { background: linear-gradient(90deg,#b3261e,#ef4444); }
    .leader-full { display: inline; }
    .leader-short { display: none; }

    /* ===== PANEL ===== */
    .panel {
      background: #fff;
      border-radius: var(--r);
      border: 1px solid var(--border2);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
    }
    .panel-h {
      padding: 13px 18px;
      border-bottom: 1px solid var(--border2);
      display: flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(90deg, #f7fbff, #fff);
    }
    .panel-h h3 { font-size: .92rem; font-weight: 700; color: var(--navy); flex: 1; }
    .panel-b { padding: 16px 18px; }
    .library-panel { height: calc(100svh - 126px); display: flex; flex-direction: column; }
    .library-panel .panel-h { flex-shrink: 0; }
    .library-head-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .library-nav-actions { display:flex; gap:6px; align-items:center; margin-right:6px; }
    .library-icon-btn {
      width: 34px; height: 34px;
      border-radius: 8px;
      border: 1.5px solid var(--border);
      background: #fff;
      color: var(--navy);
      display: inline-grid;
      place-items: center;
      font-size: 1rem;
      font-weight: 900;
      box-shadow: 0 2px 8px rgba(6,58,99,.06);
      transition: all .18s;
    }
    .library-icon-btn:hover { border-color: var(--blue2); color: var(--blue2); transform: translateY(-1px); }
    .library-icon-btn:disabled { opacity: .45; cursor: not-allowed; transform: none; }
    .library-icon-btn.close { color: #991b1b; background: #fff5f5; border-color: #fecaca; }
    .library-icon-btn.close:hover { color: #fff; background: #dc2626; border-color: #dc2626; }
    .library-crumb {
      padding: 7px 18px;
      border-bottom: 1px solid var(--border2);
      background: #f8fbff;
      color: var(--text2);
      font-size: .78rem;
      display:flex;
      align-items:center;
      gap:8px;
    }
    .library-crumb b { color: var(--navy); }
    .library-searchbar {
      padding: 11px 18px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid var(--border2);
      background: linear-gradient(90deg,#ffffff 0%,#f7fbff 100%);
      flex-shrink: 0;
    }
    .library-searchbox {
      flex: 1;
      min-width: 220px;
      display: flex;
      align-items: center;
      gap: 8px;
      border: 1.5px solid var(--border);
      border-radius: var(--r-sm);
      background: #fff;
      padding: 0 10px;
      height: 38px;
      transition: border-color .2s, box-shadow .2s;
    }
    .library-searchbox:focus-within {
      border-color: var(--blue2);
      box-shadow: 0 0 0 3px rgba(45,120,239,.12);
    }
    .library-searchbox span { color: var(--muted); font-size: .92rem; flex-shrink: 0; }
    .library-searchbox input {
      flex: 1;
      min-width: 0;
      border: 0;
      outline: none;
      background: transparent;
      color: var(--text);
      font-size: .88rem;
      font-weight: 500;
    }
    .library-search-help {
      padding: 7px 18px;
      border-bottom: 1px solid var(--border2);
      background: #fffdf6;
      color: #8a5a00;
      font-size: .76rem;
      display: none;
    }
    .library-search-help.show { display: block; }
    .library-body { padding: 0; flex: 1; min-height: 0; background: #fff; }
    .library-frame { width: 100%; height: 100%; min-height: 620px; border: 0; display: block; background: #fff; }
    .library-note { font-size: .78rem; color: var(--muted); padding: 8px 18px; border-top: 1px solid var(--border2); background: #f8fbff; }

    .library-browser { height: 100%; min-height: 0; overflow: auto; padding: 16px 18px 22px; background: #f7f9fc; }
    .library-statusbar { display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:12px; color:var(--text2); font-size:.82rem; }
    .library-statusbar b { color:var(--navy); }
    .library-grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 14px; }
    .library-item {
      border: 1px solid var(--border2);
      background: #fff;
      border-radius: 12px;
      padding: 13px 10px 11px;
      min-height: 124px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      text-align: center;
      box-shadow: var(--shadow-sm);
      transition: transform .16s, box-shadow .16s, border-color .16s, background .16s;
      cursor: pointer;
      color: var(--text);
    }
    .library-item:hover { transform: translateY(-2px); box-shadow: var(--shadow); border-color: #bcd2ea; background:#f9fcff; }
    .library-item .li-icon { font-size: 2.6rem; line-height: 1; }
    .library-item .li-name { font-weight: 700; font-size: .82rem; color: var(--text); line-height:1.35; word-break: break-word; max-width: 100%; }
    .library-item .li-meta { font-size: .68rem; color: var(--muted); line-height:1.25; }
    .library-item.folder .li-icon { color:#f0a500; }
    .library-item.file .li-icon { color: var(--blue); }
    .library-empty, .library-error-box, .library-loading-box { padding: 36px 20px; text-align:center; color: var(--muted); }
    .library-error-box { color:#8a5a00; background:#fffdf6; border:1px solid #fde68a; border-radius:12px; margin:16px 18px; }
    .library-preview { height: 100%; min-height: 0; display:flex; flex-direction:column; background:#fff; }
    .library-preview-head { padding: 10px 14px; border-bottom:1px solid var(--border2); display:flex; align-items:center; gap:10px; background:#f8fbff; }
    .library-preview-title { font-weight:800; color:var(--navy); min-width:0; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .library-preview-frame { flex:1; min-height:560px; border:0; width:100%; background:#fff; }
    .library-fallback-frame { width:100%; height:100%; min-height:620px; border:0; background:#fff; }
    .library-mini-link { color:var(--blue); font-weight:700; text-decoration:none; }

    /* ===== LIBRARY FILE POPUP ===== */
    .library-popup-overlay {
      position: fixed;
      inset: 0;
      z-index: 300;
      background: rgba(15, 23, 42, .16);
      backdrop-filter: none !important;
      -webkit-backdrop-filter: none !important;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }
    .library-popup-card {
      width: min(1180px, 96vw);
      height: min(820px, 92svh);
      background: #f7f9fc;
      border-radius: 16px;
      box-shadow: 0 28px 70px rgba(6,58,99,.24);
      border: 1.5px solid #d9e3ec;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      animation: popupIn .18s ease-out;
      opacity: 1 !important;
      filter: none !important;
      mix-blend-mode: normal !important;
      isolation: isolate;
    }
    @keyframes popupIn { from { opacity: 0; transform: translateY(10px) scale(.985); } to { opacity: 1; transform: none; } }
    .library-popup-head {
      flex-shrink: 0;
      padding: 10px 14px;
      border-bottom: 1px solid rgba(255,255,255,.16);
      display: flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, var(--navy), var(--blue));
    }
    .library-popup-title {
      flex: 1;
      min-width: 0;
      color: #fff;
      font-weight: 800;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .library-popup-viewer {
      flex: 1;
      min-height: 0;
      width: 100%;
      background: #f7f9fc;
      display: flex;
      align-items: stretch;
      justify-content: center;
      overflow: hidden;
    }
    .library-popup-frame {
      flex: 1;
      min-height: 0;
      width: 100%;
      height: 100%;
      border: 0;
      background: #f7f9fc !important;
      opacity: 1 !important;
      filter: none !important;
      mix-blend-mode: normal !important;
      color-scheme: light;
    }
    .library-popup-card.file-popup .library-popup-frame {
      max-width: 100%;
      flex: 1 1 auto;
      background: #f7f9fc !important;
    }
    .library-popup-card.folder-popup .library-popup-frame {
      max-width: none;
      flex: 1 1 auto;
    }
    .library-popup-foot { display:none !important; }
    .library-popup-close {
      width: 34px;
      height: 34px;
      border: 1.5px solid #fecaca;
      background: #fff5f5;
      color: #991b1b;
      border-radius: 9px;
      font-weight: 900;
      font-size: 1rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .library-popup-close:hover { background:#dc2626; border-color:#dc2626; color:#fff; }

    .library-popup-head .btn.ghost {
      background: rgba(255,255,255,.96);
      border-color: rgba(255,255,255,.9);
      color: var(--navy);
    }
    .library-popup-card .library-browser, .library-popup-card .library-empty, .library-popup-card .library-loading-box, .library-popup-card .library-error-box { background:#f7f9fc !important; }
    .library-popup-card.folder-popup .library-popup-viewer { background:#f7f9fc !important; align-items:stretch; justify-content:stretch; }
    .library-popup-card.file-popup .library-popup-viewer { background:#f7f9fc !important; padding:0; }
    .library-popup-card.file-popup .library-popup-frame { background:#f7f9fc !important; }
    .library-popup-card.file-popup iframe,
    .library-popup-card.folder-popup iframe { background:#f7f9fc !important; }


    /* ===== FILTERBAR ===== */
    .filterbar {
      display: flex;
      gap: 9px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }
    .search-wrap {
      display: flex;
      flex: 1;
      min-width: 240px;
      border: 1.5px solid var(--border);
      border-radius: var(--r-sm);
      background: #fff;
      overflow: hidden;
      transition: border-color .2s, box-shadow .2s;
    }
    .search-wrap:focus-within {
      border-color: var(--blue2);
      box-shadow: 0 0 0 3px rgba(45,120,239,.12);
    }
    .search-wrap input {
      flex: 1;
      border: none;
      padding: 9px 12px;
      background: transparent;
      outline: none;
      color: var(--text);
      font-size: .88rem;
    }
    .search-wrap button {
      border: none;
      background: linear-gradient(135deg, var(--blue), var(--blue2));
      color: #fff;
      padding: 9px 14px;
      font-weight: 700;
      font-size: .84rem;
    }
    .select-field {
      border: 1.5px solid var(--border);
      border-radius: var(--r-sm);
      padding: 9px 10px;
      background: #fff;
      color: var(--text);
      font-weight: 600;
      outline: none;
      cursor: pointer;
      min-width: 140px;
      transition: border-color .2s;
    }
    .select-field:focus { border-color: var(--blue2); }

    /* ===== SEGMENT ===== */
    .seg {
      display: inline-flex;
      gap: 3px;
      background: var(--bg2);
      border: 1.5px solid var(--border);
      border-radius: var(--r-sm);
      padding: 3px;
    }
    .seg-btn {
      border: none;
      border-radius: var(--r-xs);
      padding: 7px 14px;
      font-weight: 600;
      font-size: .82rem;
      background: transparent;
      color: var(--text2);
      transition: all .18s;
    }
    .seg-btn.active {
      background: linear-gradient(135deg, var(--blue), var(--blue2));
      color: #fff;
      box-shadow: 0 4px 12px rgba(21,86,200,.25);
    }
    .filter-note { font-size: .78rem; color: var(--muted); }

    /* ===== DESKTOP CALENDAR TOOLBAR (1 dòng) ===== */
    .cal-toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      flex-wrap: nowrap;
    }
    .cal-toolbar .cal-search {
      display: flex;
      flex: 1;
      min-width: 0;
      border: 1.5px solid var(--border);
      border-radius: var(--r-sm);
      background: #fff;
      overflow: hidden;
      height: 38px;
      transition: border-color .2s, box-shadow .2s;
    }
    .cal-toolbar .cal-search:focus-within {
      border-color: var(--blue2);
      box-shadow: 0 0 0 3px rgba(45,120,239,.12);
    }
    .cal-toolbar .cal-search input {
      flex: 1;
      border: none;
      padding: 0 12px;
      background: transparent;
      outline: none;
      color: var(--text);
      font-size: .88rem;
      min-width: 0;
    }
    .cal-toolbar .cal-search button {
      border: none;
      background: linear-gradient(135deg, var(--blue), var(--blue2));
      color: #fff;
      padding: 0 13px;
      font-size: .88rem;
      cursor: pointer;
      flex-shrink: 0;
    }
    .cal-toolbar .cal-select {
      height: 38px;
      border: 1.5px solid var(--border);
      border-radius: var(--r-sm);
      padding: 0 10px;
      background: #fff;
      color: var(--text);
      font-weight: 600;
      font-size: .84rem;
      outline: none;
      cursor: pointer;
      white-space: nowrap;
      transition: border-color .2s;
      flex-shrink: 0;
    }
    .cal-toolbar .cal-select:focus { border-color: var(--blue2); }
    .cal-toolbar .kind-seg {
      display: inline-flex;
      gap: 3px;
      background: var(--bg2);
      border: 1.5px solid var(--border);
      border-radius: var(--r-sm);
      padding: 3px;
      flex-shrink: 0;
    }
    .cal-toolbar .kind-btn {
      border: none;
      border-radius: var(--r-xs);
      height: 30px;
      padding: 0 13px;
      font-weight: 600;
      font-size: .82rem;
      background: transparent;
      color: var(--text2);
      cursor: pointer;
      white-space: nowrap;
      transition: all .18s;
    }
    .cal-toolbar .kind-btn:hover { background: rgba(21,86,200,.08); color: var(--blue); }
    .cal-toolbar .kind-btn.active {
      background: linear-gradient(135deg, var(--blue), var(--blue2));
      color: #fff;
      box-shadow: 0 3px 10px rgba(21,86,200,.28);
    }
    .cal-toolbar .btn-add {
      height: 38px;
      padding: 0 16px;
      border: none;
      border-radius: var(--r-sm);
      background: linear-gradient(135deg, var(--blue), var(--blue2));
      color: #fff;
      font-weight: 700;
      font-size: .88rem;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      box-shadow: 0 4px 14px rgba(21,86,200,.3);
      transition: all .18s;
    }
    .cal-toolbar .btn-add:hover { box-shadow: 0 6px 18px rgba(21,86,200,.4); transform: translateY(-1px); }

    /* ===== MEETING CARDS ===== */
    .cards { display: grid; gap: 11px; }
    .meeting-card {
      background: #fff;
      border: 1px solid var(--border2);
      border-left: 3px solid var(--blue);
      border-radius: var(--r);
      padding: 15px 16px;
      box-shadow: var(--shadow-sm);
      transition: all .18s;
      position: relative;
    }
    .meeting-card:hover { transform: translateY(-2px); box-shadow: var(--shadow); border-left-color: var(--blue3); }
    .meeting-card.truc { border-left-color: var(--gold); }
    .meeting-card.truc:hover { border-left-color: var(--gold2); }
    .m-top { display: flex; justify-content: space-between; gap: 8px; align-items: flex-start; flex-wrap: wrap; }
    @media (min-width: 769px) {
      .meeting-card .m-top { justify-content: flex-start; align-items: center; gap: 8px; }
      .meeting-card .m-dateline { justify-content: flex-start; margin-left: 0; }
    }
    .m-badges { display: flex; gap: 4px; flex-wrap: wrap; }
    .m-dateline { display: flex; gap: 5px; flex-wrap: wrap; align-items: center; }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      border-radius: 99px;
      background: #eef4ff;
      color: #1556c8;
      font-weight: 700;
      padding: 3px 9px;
      font-size: .73rem;
    }
    .pill.mono { font-family: "JetBrains Mono", monospace; background: #f1f5f9; color: var(--text2); }
    .pill.status-DRAFT { background: #f1f5f9; color: #475569; }
    .pill.status-PUBLISHED { background: #e4f7ee; color: #0b6e42; }
    .pill.status-CANCELLED { background: #fee2e2; color: #991b1b; }
    .pill.status-COMPLETED { background: #e0f2fe; color: #0369a1; }
    .pill.type-TRUC_BAN { background: #fff7ed; color: #9a3412; }
    .date-pill {
      display: inline-flex;
      align-items: center;
      border-radius: 6px;
      background: var(--bg2);
      color: var(--text2);
      font-weight: 700;
      padding: 4px 10px;
      font-size: .76rem;
      gap: 4px;
    }
    .date-pill.time { background: #dbeafe; color: #1e40af; }
    .date-pill.weekend { background: #fdecea; color: #b91c1c; }
    .date-pill.today { background: #dcfce7; color: #15803d; }
    .m-title {
      font-weight: 700;
      color: var(--navy);
      line-height: 1.4;
      margin: 10px 0 8px;
      font-size: .95rem;
    }
    .m-meta { display: grid; gap: 4px; }
    .m-meta-row { display: flex; align-items: baseline; gap: 6px; font-size: .85rem; color: var(--text2); }
    .m-meta-row .label { color: var(--muted); font-size: .76rem; flex-shrink: 0; }
    .m-actions { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border2); }

    /* ===== TABLE ===== */
    .table-wrap { overflow-x: auto; border-radius: var(--r-xs); }
    .tbl { width: 100%; border-collapse: collapse; }
    .tbl th, .tbl td {
      border-bottom: 1px solid var(--border2);
      padding: 10px 12px;
      text-align: left;
      vertical-align: top;
    }
    .tbl th {
      background: #edf3f9;
      color: var(--muted);
      font-size: .70rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .4px;
      white-space: nowrap;
    }
    .tbl tr:last-child td { border-bottom: none; }
    .tbl tr:hover td { background: #fafbff; }

    /* Đồng bộ màu chữ màn hình Quản lý lịch với tông xanh chung */
    #screen-manage .tbl td { color: var(--text2); }
    #screen-manage .tbl td b { color: var(--navy); font-weight: 800; }
    #screen-manage .tbl td.mono { color: var(--blue); font-weight: 800; }
    #screen-manage .tbl td.nowrap { color: var(--navy); font-weight: 700; }
    #screen-manage .tbl td:nth-child(4) { color: var(--text2); font-weight: 600; }
    #screen-manage .tbl .muted { color: var(--muted) !important; }
    #screen-manage .tbl tr:hover td { background: #f7fbff; }
    #screen-manage .toolbar input, #screen-manage .toolbar select { color: var(--text2); }

    .leader-table td:nth-child(n+2), .leader-table th:nth-child(n+2) { text-align: center; }

    .leader-table td:first-child { font-weight: 800; }
    .leader-table td:first-child b { font-weight: 800; }
    @media (max-width: 768px) {
      .leader-table th, .leader-table td { font-size: .75rem; padding: 8px 6px; white-space: nowrap; }
      .leader-table td:first-child { white-space: nowrap; font-size: .8rem; }
      .barline { min-width: 40px !important; }
    }
    .barline { height: 6px; background: var(--bg2); border-radius: 99px; overflow: hidden; min-width: 80px; }
    .barline span { display: block; height: 100%; background: linear-gradient(90deg, var(--blue), var(--blue2)); border-radius: 99px; }

    /* ===== MODAL ===== */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(7,15,38,.55);
      backdrop-filter: blur(4px);
      display: grid;
      place-items: center;
      padding: 16px;
      z-index: 100;
    }
    .modal-card {
      width: min(1000px, 100%);
      max-height: 92svh;
      overflow: auto;
      background: #fff;
      border-radius: 18px;
      box-shadow: var(--shadow-lg);
    }
    .modal-h {
      position: sticky;
      top: 0;
      background: #fff;
      border-bottom: 1px solid var(--border2);
      padding: 15px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 2;
    }
    .modal-h h3 { font-size: .98rem; font-weight: 700; color: var(--navy); flex: 1; }
    .modal-close {
      border: none;
      background: var(--bg2);
      border-radius: var(--r-xs);
      padding: 7px 10px;
      font-size: .9rem;
      color: var(--text2);
      transition: background .18s;
    }
    .modal-close:hover { background: #fee2e2; color: var(--red); }
    .modal-b { padding: 20px; }
    .form-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 13px; }
    .form-grid .full { grid-column: 1 / -1; }
    .form-grid .half { grid-column: span 2; }

    /* ===== DROPZONE ===== */
    .drop {
      border: 2px dashed var(--border);
      border-radius: var(--r-sm);
      padding: 20px;
      text-align: center;
      background: var(--bg2);
      color: var(--muted);
      font-size: .85rem;
      cursor: pointer;
      transition: all .18s;
      margin-top: 8px;
    }
    .drop:hover, .drop.drag { border-color: var(--blue2); background: #eff6ff; color: var(--blue); }
    .file-row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      border: 1px solid var(--border2);
      border-radius: var(--r-xs);
      padding: 10px 13px;
      margin-bottom: 6px;
      background: var(--bg2);
    }
    .queued-list { margin-top: 8px; display: grid; gap: 5px; }
    .queued-file {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
      border: 1px solid var(--border2);
      background: var(--bg2);
      border-radius: var(--r-xs);
      padding: 7px 10px;
      font-size: .83rem;
    }
    .queued-file button {
      border: none;
      background: #fee2e2;
      color: #991b1b;
      border-radius: 5px;
      padding: 3px 8px;
      font-size: .76rem;
    }

    /* ===== LOG ===== */
    .log-item {
      border-left: 3px solid #c5ddf5;
      padding: 8px 12px;
      background: #f8fafc;
      margin-bottom: 6px;
      border-radius: 0 var(--r-xs) var(--r-xs) 0;
      font-size: .83rem;
    }

    /* ===== MISC ===== */
    .empty { text-align: center; color: var(--muted); padding: 30px 20px; font-size: .88rem; }
    .loading { display: grid; place-items: center; padding: 40px; color: var(--muted); gap: 6px; }
    .spin {
      width: 30px; height: 30px;
      border: 3px solid var(--border2);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin .9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg) } }
    .sp { height: 14px; }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

    /* ===== TOOLBAR ===== */
    .toolbar { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 12px; }
    .toolbar input, .toolbar select {
      border: 1.5px solid var(--border);
      border-radius: var(--r-sm);
      padding: 8px 11px;
      background: #fff;
      outline: none;
      flex: 1;
      min-width: 180px;
      transition: border-color .2s;
    }
    .toolbar input:focus, .toolbar select:focus { border-color: var(--blue2); }

    /* ===== ROLE BADGE ===== */
    .role-badge {
      font-size: .65rem;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 4px;
      background: rgba(45,120,239,.12);
      color: var(--blue);
      text-transform: uppercase;
    }

    /* ===== BOTTOM NAV (mobile only) ===== */
    .bottom-nav { display: none; }
    .app-ready .bottom-nav { display: none; }
    /* Hiện bottom-nav chỉ khi đã đăng nhập */
    body.logged-in .bottom-nav { display: none; }

    /* ===== SIDEBAR OVERLAY ===== */
    .sidebar-overlay { display: none; }

    /* ===== RESPONSIVE ===== */
    @media (min-width: 769px) {
      .cal-filter-row { display: none !important; }
      .cal-search-row  { display: none !important; }
      .desktop-filters { display: none !important; }
      .cal-toolbar     { display: flex !important; }
    }
    @media (max-width: 768px) {
      .cal-toolbar { display: none !important; }
    }
    @media (max-width: 1024px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .form-grid { grid-template-columns: 1fr 1fr; }
      .two-col { grid-template-columns: 1fr; }
    }

    @media (max-width: 768px) {
      :root { --sidebar-w: 270px; }
      .sidebar {
        position: fixed;
        left: 0; top: 0; bottom: 0;
        transform: translateX(-100%);
        transition: transform .25s cubic-bezier(.4,0,.2,1);
        box-shadow: none;
      }
      .sidebar.open {
        transform: translateX(0);
        box-shadow: 6px 0 24px rgba(0,0,0,.25);
      }
      .sidebar-overlay {
        display: block;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,.4);
        z-index: 29;
        opacity: 0;
        pointer-events: none;
        transition: opacity .25s;
      }
      .sidebar-overlay.show { opacity: 1; pointer-events: auto; }
      .main { width: 100%; }
      .hamb { display: flex; }
      .topbar-actions { display: none; }
      .content { padding: 14px; padding-bottom: 80px; }
      .topbar { padding: 10px 16px; }
      .topbar-title, .topbar-sub { display: none; }
      .topbar-mobile-title { display: flex !important; }
      .leader-full { display: none; }
      .leader-short { display: inline; }
      .library-panel { height: calc(100svh - 108px); }
      .library-frame { min-height: calc(100svh - 236px); }
      .library-head-actions .btn { padding: 7px 10px; font-size: .78rem; }
      .library-nav-actions { order: -1; width: 100%; justify-content: flex-end; margin-right: 0; }
      .library-icon-btn { width: 32px; height: 32px; }
      .library-searchbar { padding: 9px 12px; flex-wrap: wrap; }
      .library-searchbox { flex-basis: 100%; min-width: 0; }
      .library-searchbar .btn { flex: 1; justify-content: center; }
      .library-popup-overlay { padding: 8px; }
      .library-popup-card { width: 100vw; height: 96svh; border-radius: 12px; }
      .library-popup-card.file-popup .library-popup-frame { max-width: 100%; flex-basis: 100%; }
      .library-popup-head { padding: 9px 10px; }
      .library-popup-title { font-size: .86rem; }

      /* Bottom navigation bar */
      body.logged-in .bottom-nav {
        display: flex;
        position: fixed;
        bottom: 0; left: 0; right: 0;
        z-index: 40;
        background: #fff;
        border-top: 1px solid var(--border);
        box-shadow: 0 -4px 20px rgba(11,31,69,.1);
        padding: 6px 0 max(6px, env(safe-area-inset-bottom));
      }
      .bn-item {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2px;
        border: none;
        background: transparent;
        color: var(--muted);
        padding: 6px 2px;
        font-size: .64rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: .3px;
        transition: color .18s;
        position: relative;
      }
      .bn-item .bn-icon { font-size: 1.22rem; display:flex; align-items:center; justify-content:center; }
      .bn-item .bn-icon svg { width:22px; height:22px; }
      .bn-item .bn-badge {
        position: absolute;
        top: 3px;
        right: 50%;
        transform: translateX(10px);
        background: var(--blue);
        color: #fff;
        border-radius: 99px;
        font-size: .6rem;
        font-weight: 800;
        padding: 1px 5px;
        min-width: 16px;
        text-align: center;
      }
      .bn-item.active {
        color: var(--blue2);
      }
      .bn-item.active::after {
        content: '';
        position: absolute;
        top: 0; left: 50%;
        transform: translateX(-50%);
        width: 36px; height: 3px;
        background: var(--blue);
        border-radius: 0 0 3px 3px;
      }
      .bn-item.bn-logout { color: #dc2626; }
      /* User popup mobile */
      .user-popup {
        position: fixed; inset: 0; z-index: 50;
        background: rgba(0,0,0,.35);
        display: flex; align-items: flex-end; justify-content: center;
      }
      .user-popup.hide { display: none !important; }
      .user-popup-card {
        background: #fff;
        border-radius: 18px 18px 0 0;
        padding: 20px 20px 30px;
        width: 100%; max-width: 480px;
        box-shadow: 0 -4px 24px rgba(0,0,0,.15);
        animation: slideUp .22s ease;
      }
      @keyframes slideUp { from{transform:translateY(60px);opacity:0} to{transform:none;opacity:1} }
      .user-popup-header {
        display: flex; align-items: center; gap: 12px;
        padding-bottom: 16px; margin-bottom: 12px;
        border-bottom: 1px solid var(--border2);
      }
      .user-popup-btn {
        width: 100%; border: none; background: var(--bg2);
        border-radius: var(--r-sm); padding: 13px 16px;
        font-size: .92rem; font-weight: 600; color: var(--text);
        text-align: left; margin-bottom: 8px; cursor: pointer;
        transition: background .15s;
      }
      .user-popup-btn:hover { background: var(--border); }
      .user-popup-btn.logout { color: #dc2626; background: #fee2e2; }
      .user-popup-btn.logout:hover { background: #fecaca; }
      /* Mobile: ẩn pill loại lịch, trạng thái, Hôm nay */
      @media (max-width: 768px) {
        .pill.type-HOP,.pill.type-TRUC_BAN,.pill.type-CONG_TAC,
        .pill[class*="type-"],
        .pill[class*="status-"],
        .pill-today { display: none !important; }
      }
      .bn-item.bn-logout:active { background: #fee2e2; }
      /* Mobile calendar filter */
      .cal-search-row { display:flex; gap:8px; align-items:center; margin-bottom:8px; }
      .cal-filter-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:7px; margin-bottom:10px; }
      .cycle-btn {
        border: 1.5px solid var(--border);
        border-radius: var(--r-sm);
        padding: 9px 6px;
        font-size: .78rem;
        font-weight: 700;
        background: #fff;
        color: var(--text2);
        text-align: center;
        transition: all .18s;
        letter-spacing: .3px;
      }
      .cycle-btn.active {
        background: linear-gradient(135deg,var(--blue),var(--blue2));
        color: #fff;
        border-color: transparent;
        box-shadow: 0 4px 12px rgba(21,86,200,.25);
      }
      .cycle-btn:active { filter: brightness(.92); }
      .stats-grid { grid-template-columns: 1fr 1fr; }
      .form-grid { grid-template-columns: 1fr; }
      .filterbar { gap: 7px; }
      .search-wrap { min-width: 0; }
      .seg { width: 100%; }
      .seg-btn { flex: 1; }
    }

    @media (max-width: 480px) {
      .stats-grid { grid-template-columns: 1fr 1fr; gap: 9px; }
      .stat-card { padding: 13px 14px; }
      .stat-v { font-size: 1.6rem; }
      .m-top { display: block; }
      .m-dateline { justify-content: flex-start; margin-top: 6px; }
      .login-body { padding: 20px 20px 26px; }
    }
  </style>
</head>

function api(action, payload={}) {
  payload.action = action;
  payload.token = APP.token;

  // Upload file (base64 lớn) → dùng fetch POST để tránh giới hạn URL
  if (action === 'uploadMeetingFile') {
    return fetch(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(payload),
      redirect: 'follow'
    })
    .then(r => r.text())
    .then(text => {
      // GAS POST trả JSON trực tiếp
      try { const res = JSON.parse(text); if (!res || res.ok === false) throw new Error((res && res.msg) || 'Lỗi upload'); return res; }
      catch(e) { throw new Error('Lỗi parse response: ' + text.slice(0,100)); }
    });
  }

  // Các action thông thường → dùng JSONP (GET)
  return new Promise((resolve, reject) => {
    const cbName = '_cb_' + Date.now() + Math.random().toString(36).slice(2);
    const script = document.createElement('script');
    const timer = setTimeout(() => {
      cleanup();
      reject(new Error('Timeout — GAS không phản hồi'));
    }, action === 'librarySearchFiles' ? 90000 : 30000);
    function cleanup() {
      clearTimeout(timer);
      try { delete window[cbName]; } catch(e) {}
      if (script && script.parentNode) script.parentNode.removeChild(script);
    }
    window[cbName] = function(res) {
      cleanup();
      if (!res || res.ok === false) reject(new Error((res && res.msg) || 'Lỗi không xác định'));
      else resolve(res);
    };
    const qs = new URLSearchParams({ data: JSON.stringify(payload), callback: cbName, _ts: Date.now().toString() });
    script.src = GAS_URL + '?' + qs.toString();
    script.async = true;
    script.onerror = function() {
      cleanup();
      reject(new Error('Không kết nối được GAS — kiểm tra Access=Anyone'));
    };
    (document.head || document.body).appendChild(script);
  });
}

function dateVN(iso){
  if(!iso)return'';
  const s=String(iso).trim();
  const m1=s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
  if(m1)return`${m1[3].padStart(2,'0')}/${m1[2].padStart(2,'0')}/${m1[1]}`;
  try{const dt=new Date(s);if(!isNaN(dt.getTime()))return`${String(dt.getDate()).padStart(2,'0')}/${String(dt.getMonth()+1).padStart(2,'0')}/${dt.getFullYear()}`;}catch(e){}
  return iso;
}
function setupItems(keys){for(const k of keys){if(APP.setup[k]&&APP.setup[k].length)return APP.setup[k];}return[]}
function typeLabel(v){const a=setupItems(['MEETING_TYPE','LOAI_LICH']).find(x=>x.value===v);return a?a.label:v}

function optionsAny(keys,selected){return setupItems(keys).map(x=>`<option value="${esc(x.value)}"${x.value===selected?' selected':''}>${esc(x.label)}</option>`).join('')}
function normText(s){return String(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/đ/g,'d').replace(/[^a-z0-9]+/g,' ').trim()}

function toHHmm(v){
  let s=String(v||'').trim();
  if(!s)return'';
  s=s.toLowerCase().replace(/giờ/g,'h').replace(/[：.]/g,':').replace(/\s+/g,' ').trim();
  const isPm=/\bpm\b|\bch\b/.test(s), isAm=/\bam\b|\bsa\b/.test(s);
  s=s.replace(/\b(am|pm|sa|ch)\b/g,'').trim();
  let m=s.match(/^(\d{1,2})\s*[h:]\s*(\d{1,2})(?::\d{1,2})?$/) || s.match(/^(\d{1,2})(\d{2})$/);
  if(m){let hh=Number(m[1]), mm=Number(m[2]); if(isPm&&hh<12)hh+=12; if(isAm&&hh===12)hh=0; if(hh>=0&&hh<24&&mm>=0&&mm<60)return String(hh).padStart(2,'0')+':'+String(mm).padStart(2,'0');}
  m=s.match(/^(\d{1,2})$/);
  if(m){let hh=Number(m[1]); if(isPm&&hh<12)hh+=12; if(isAm&&hh===12)hh=0; if(hh>=0&&hh<24)return String(hh).padStart(2,'0')+':00';}
  return'';
}
function requireHHmm(inputId,label){
  const el=$(inputId); const val=toHHmm(el?.value||'');
  if(!val){ if(el)el.focus(); throw new Error(label+' không đúng định dạng. Vui lòng nhập HH:mm, ví dụ 14:45 hoặc 14h45.'); }
  if(el)el.value=val;
  return val;
}


function compactText(s){return normText(s).replace(/\s+/g,'')}
function levenshteinWithin(a,b,maxDist){
  a=String(a||''); b=String(b||'');
  if(a===b)return true;
  if(!a||!b)return false;
  if(Math.abs(a.length-b.length)>maxDist)return false;
  let prev=Array.from({length:b.length+1},(_,i)=>i);
  for(let i=1;i<=a.length;i++){
    let cur=[i], rowMin=cur[0];
    for(let j=1;j<=b.length;j++){
      const cost=a[i-1]===b[j-1]?0:1;
      const val=Math.min(prev[j]+1,cur[j-1]+1,prev[j-1]+cost);
      cur[j]=val; if(val<rowMin)rowMin=val;
    }
    if(rowMin>maxDist)return false;
    prev=cur;
  }
  return prev[b.length]<=maxDist;
}
function fuzzyTokenMatch(qt,hTokens){
  if(!qt)return true;
  if(qt.length===1)return hTokens.some(t=>t[0]===qt);
  const maxDist=qt.length<=4?1:(qt.length<=8?2:3);
  return hTokens.some(t=>{
    if(!t)return false;
    if(t===qt||t.includes(qt)||qt.includes(t))return true;
    if(t[0]!==qt[0])return false;
    return levenshteinWithin(qt,t,maxDist);
  });
}
function smartMatch(haystack,query){
  // Tìm kiếm lịch theo hướng CHÍNH XÁC HƠN:
  // - Không phân biệt hoa/thường, có dấu/không dấu.
  // - Tách nhiều từ khóa; TẤT CẢ từ khóa phải có trong dữ liệu.
  // - Không dùng fuzzy/Levenshtein để tránh nhập "Phạm Quốc Hưng" nhưng lôi nhầm lịch khác.
  const h=normText(haystack);
  const q=normText(query);
  if(!q)return true;
  const tokens=q.split(' ').filter(x=>x.length>0);
  if(!tokens.length)return true;
  return tokens.every(t=>h.includes(t));
}

function normLeaderName(s){
  return normText(String(s||'')
    .replace(/^(Đ\/c|D\/c|đ\/c|d\/c|Đồng chí|dong chi|Đc|dc)\s*/i,'')
    .replace(/\s*[-–—]\s*.*/,'')
  );
}
function leaderFullName(v){
  const x=normText(v);
  const map={
    'hung':'Pham Quoc Hung',
    'pham quoc hung':'Pham Quoc Hung',
    'duong':'Ngo Tung Duong',
    'ngo tung duong':'Ngo Tung Duong',
    'loi':'Bui Ngoc Loi',
    'bui ngoc loi':'Bui Ngoc Loi',
    'thang':'Nguyen Canh Thang',
    'nguyen canh thang':'Nguyen Canh Thang'
  };
  return map[x]||String(v||'');
}
function meetingLeaderHaystack(m){
  // Chỉ dùng trường Chủ trì và Lãnh đạo liên quan để tránh khớp nhầm tên trong thành phần tham dự.
  return `${m.chuTri||''};${m.lanhDaoLienQuan||''}`;
}
function matchLeaderExact(m,leader){
  if(!leader||leader==='all')return true;
  const target=normLeaderName(leaderFullName(leader));
  if(!target)return true;
  const raw=meetingLeaderHaystack(m);
  const parts=String(raw||'').split(/[,;\n]+/).map(x=>normLeaderName(x)).filter(Boolean);
  return parts.some(p=>p===target||p.includes(target)||target.includes(p));
}

function renderDashboard(){
  const d=APP.dashboard||{};
  const now=new Date(); now.setHours(0,0,0,0);
  const[wStart,wEnd]=weekRange(now);
  const mStart=new Date(now.getFullYear(),now.getMonth(),1);
  const mEnd=new Date(now.getFullYear(),now.getMonth()+1,0,23,59,59,999);
  // Luôn dùng toàn bộ lịch cho dashboard (load ngầm nếu chưa có)
  const meetings=APP.allMeetings||APP.meetings||[];
  if(!APP.allMeetings && !APP._loadingAll){
    APP._loadingAll=true;
    api('getMeetings',{showPast:true,limit:5000}).then(res=>{
      APP.allMeetings=res.meetings||[];
      APP._loadingAll=false;
      renderDashboard();
    }).catch(()=>{APP._loadingAll=false;});
    // Hiển thị chú thích đang tải
  }
  const isFullData=!!APP.allMeetings;
  const nonTrucBan=meetings.filter(m=>m.loaiLich!=='TRUC_BAN');
  const countWeek=nonTrucBan.filter(m=>{const s=parseIsoDate(m.ngayBatDau),e=parseIsoDate(m.ngayKetThuc||m.ngayBatDau)||s;return s&&e&&s<=wEnd&&e>=wStart;}).length;
  const countMonth=nonTrucBan.filter(m=>{const s=parseIsoDate(m.ngayBatDau),e=parseIsoDate(m.ngayKetThuc||m.ngayBatDau)||s;return s&&e&&s<=mEnd&&e>=mStart;}).length;
  const yStart=new Date(now.getFullYear(),0,1); const yEnd=new Date(now.getFullYear(),11,31,23,59,59,999);
  const countYear=nonTrucBan.filter(m=>{const s=parseIsoDate(m.ngayBatDau),e=parseIsoDate(m.ngayKetThuc||m.ngayBatDau)||s;return s&&e&&s<=yEnd&&e>=yStart;}).length;
  // Danh sách 4 lãnh đạo cố định theo thứ tự ưu tiên
  const LEADERS = [
    { name: 'Phạm Quốc Hưng',    display: 'Đ/c Phạm Quốc Hưng – Chi cục trưởng', short: 'Đ/c Hưng' },

  ];
  // Hàm chuẩn hoá: bỏ dấu, bỏ prefix "đ/c", "c ", chữ thường
  function normName(s){
    return String(s||'').toLowerCase()
      .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
      .replace(/đ/g,'d')
      .replace(/^(d\/c|c)\s+/,'')
      .replace(/\s*[-–]\s*.*/,'')   // bỏ phần sau gạch ngang (chức danh)
      .replace(/\s+/g,' ').trim();
  }
  const leaderMap={};
  LEADERS.forEach(l=>{ leaderMap[l.name]={...l,week:0,month:0,year:0}; });
  nonTrucBan.forEach(m=>{
    const s=parseIsoDate(m.ngayBatDau),e=parseIsoDate(m.ngayKetThuc||m.ngayBatDau)||s;
    if(!s)return;
    const raw=[m.chuTri,m.lanhDaoLienQuan].join(',');
    const parts=raw.split(/[,;]+/).map(x=>x.trim()).filter(x=>x.length>1);
    const matched=new Set();
    parts.forEach(part=>{
      const pn=normName(part);
      LEADERS.forEach(l=>{
        if(matched.has(l.name))return;
        if(pn===normName(l.name)||pn.includes(normName(l.name))||normName(l.name).includes(pn)){
          matched.add(l.name);
          const inWeek=s<=wEnd&&e>=wStart;
          const inMonth=s<=mEnd&&e>=mStart;
          const inYear=s<=yEnd&&e>=yStart;
          if(inWeek)leaderMap[l.name].week++;
          if(inMonth)leaderMap[l.name].month++;
          if(inYear)leaderMap[l.name].year++;
        }
      });
    });
  });
  // Giữ đúng thứ tự 4 lãnh đạo, luôn hiển thị dù = 0

      ${statCardClickable('Trong tháng',countMonth,'Lịch họp tháng '+String(now.getMonth()+1)+'/'+now.getFullYear(),'month')}
      ${statCardClickable('Trong năm',countYear,(isFullData?'':'⏳ ')+'Năm '+now.getFullYear(),'year')}

            <tbody>
              ${leaderRows.map(x=>{
                const _dc={'Phạm Quốc Hưng':'#0f4c81','Ngô Tùng Dương':'#b76b00','Bùi Ngọc Lợi':'#0b67b2','Nguyễn Cảnh Thắng':'#38a3d1'};
                const _dot=_dc[x.name]||'#5f6b76';
                return`<tr>
                <td style="color:${_dot};font-weight:800"><span style="display:inline-block;width:9px;height:9px;border-radius:50%;background:${_dot};margin-right:6px;vertical-align:middle;flex-shrink:0;box-shadow:0 0 0 2px rgba(255,255,255,.9)"></span><b style="color:${_dot}"><span class="leader-full">Đ/c ${esc(x.name)}</span><span class="leader-short">${esc(x.short||('Đ/c '+x.name.split(' ').pop()))}</span></b></td>

                <td style="cursor:pointer;color:var(--blue);font-weight:600" onclick="openLeaderStatDetail('${esc(x.name)}','Đ/c ${esc(x.name)}','month')" title="Bấm để xem danh sách">${x.month}</td>
                <td style="cursor:pointer;color:var(--blue);font-weight:700" onclick="openLeaderStatDetail('${esc(x.name)}','Đ/c ${esc(x.name)}','year')" title="Bấm để xem danh sách"><b>${x.year}</b></td>

function openLeaderStatDetail(leaderName, leaderShort, period){
  const today=new Date(); today.setHours(0,0,0,0);
  const[wStart,wEnd]=weekRange(today);
  const mStart=new Date(today.getFullYear(),today.getMonth(),1);
  const mEnd=new Date(today.getFullYear(),today.getMonth()+1,0,23,59,59,999);
  const yStart=new Date(today.getFullYear(),0,1);
  const yEnd=new Date(today.getFullYear(),11,31,23,59,59,999);
  const meetings=APP.allMeetings||APP.meetings||[];
  function normLName(s){
    return String(s||'').toLowerCase()
      .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
      .replace(/\u0111/g,'d')
      .replace(/^(d\/c|c)\s+/,'')
      .replace(/\s*[-\u2013]\s*.*/,'')
      .replace(/\s+/g,' ').trim();
  }
  const normTarget=normLName(leaderName);
  function matchLeader(m){
    const raw=[m.chuTri,m.lanhDaoLienQuan].join(',');
    const parts=raw.split(/[,;]+/).map(x=>x.trim()).filter(x=>x.length>1);
    return parts.some(p=>{
      const pn=normLName(p);
      return pn===normTarget||pn.includes(normTarget)||normTarget.includes(pn);
    });
  }
  const nonTrucBan=meetings.filter(m=>m.loaiLich!=='TRUC_BAN');
  let arr=nonTrucBan.filter(m=>{
    if(!matchLeader(m))return false;
    const s=parseIsoDate(m.ngayBatDau),e=parseIsoDate(m.ngayKetThuc||m.ngayBatDau)||s;
    if(!s)return false;
    if(period==='week')return s<=wEnd&&e>=wStart;
    if(period==='month')return s<=mEnd&&e>=mStart;
    if(period==='year')return s<=yEnd&&e>=yStart;
    return true;
  });
  arr.sort((a,b)=>{const sa=parseIsoDate(a.ngayBatDau)||new Date(0),sb=parseIsoDate(b.ngayBatDau)||new Date(0);return sa-sb;});
  const periodLabel={week:'Tu\u1ea7n n\xe0y',month:'Th\xe1ng n\xe0y',year:'N\u0103m nay'}[period]||period;
  const cards=arr.length?meetingCards(arr,true):'<div class="empty">Kh\xf4ng c\xf3 l\u1ecbch.</div>';
  showModal('<h3>\ud83d\udccb '+esc(leaderShort)+' \u2014 '+periodLabel+' \u2014 '+arr.length+' l\u1ecbch</h3>',
    '<div style="max-height:60vh;overflow:auto">'+cards+'</div>'+
    '<div style="display:flex;justify-content:flex-end;margin-top:12px"><button class="btn" onclick="closeModal()">\u0110\xf3ng</button></div>'
  );
}

function openTypeDetail(key, label, clickType){

    arr=meetings.filter(m=>m.trangThai===key);

function libraryIconFor(item){
  if(!item)return'📄';
  if(item.type==='folder'||item.mimeType==='application/vnd.google-apps.folder')return'📁';
  const mt=String(item.mimeType||'').toLowerCase();
  const name=String(item.name||'').toLowerCase();
  if(mt.includes('pdf')||name.endsWith('.pdf'))return'📕';
  if(mt.includes('spreadsheet')||mt.includes('excel')||name.match(/\.(xls|xlsx|csv)$/))return'📊';
  if(mt.includes('document')||mt.includes('word')||name.match(/\.(doc|docx)$/))return'📝';
  if(mt.includes('presentation')||mt.includes('powerpoint')||name.match(/\.(ppt|pptx)$/))return'📽️';
  if(mt.includes('image')||name.match(/\.(png|jpg|jpeg|gif|webp)$/))return'🖼️';
  if(mt.includes('video'))return'🎞️';
  if(mt.includes('zip')||name.match(/\.(zip|rar|7z)$/))return'🗜️';
  return'📄';
}
function libraryPreviewUrl(item){
  const id=encodeURIComponent(item && item.id || '');
  const mt=String(item && item.mimeType || '').toLowerCase();
  const name=String(item && item.name || '').toLowerCase();
  const url=String(item && item.url || '');
  if(item && item.previewUrl)return item.previewUrl;

  // Google Docs/Sheets/Slides: dùng preview riêng để không mở ra Drive.
  if(mt==='application/vnd.google-apps.document' || url.includes('docs.google.com/document/'))return `https://docs.google.com/document/d/${id}/preview?rm=minimal&embedded=true`;
  if(mt==='application/vnd.google-apps.spreadsheet' || url.includes('docs.google.com/spreadsheets/'))return `https://docs.google.com/spreadsheets/d/${id}/preview?rm=minimal&embedded=true`;
  if(mt==='application/vnd.google-apps.presentation' || url.includes('docs.google.com/presentation/'))return `https://docs.google.com/presentation/d/${id}/preview?rm=minimal&embedded=true`;
  if(mt==='application/vnd.google-apps.form')return item.url||`https://drive.google.com/open?id=${id}`;

  // PDF: dùng Drive preview để mở ổn định ngay trong popup.
  // Không dùng link uc/download trong iframe vì Chrome/Drive dễ báo "Không có bản xem trước nào".
  if(mt==='application/pdf' || name.endsWith('.pdf')){
    return `https://drive.google.com/file/d/${id}/preview?rm=minimal&embedded=true`;
  }

  // Ảnh: mở trực tiếp trong iframe.
  if(mt.startsWith('image/') || name.match(/\.(png|jpg|jpeg|gif|webp)$/)){
    return `https://drive.google.com/uc?export=view&id=${id}`;
  }

  // Word/Excel/PowerPoint: dùng Google Viewer.
  if(mt.includes('msword') || mt.includes('wordprocessingml') || mt.includes('spreadsheet') || mt.includes('excel') || mt.includes('presentation') || mt.includes('powerpoint') || name.match(/\.(doc|docx|xls|xlsx|ppt|pptx)$/)){
    return `https://docs.google.com/gview?embedded=true&url=https://drive.google.com/uc?export=download&id=${id}`;
  }

  return `https://drive.google.com/file/d/${id}/preview?rm=minimal&embedded=true`;
}
function libraryOpenUrl(item){
  if(!item)return '#';
  if(item.openUrl)return item.openUrl;
  if(item.url)return item.url;
  return `https://drive.google.com/open?id=${encodeURIComponent(item.id||'')}`;
}

function driveIdFromUrl(url){
  const s=String(url||'');
  let m=s.match(/\/folders\/([a-zA-Z0-9_-]+)/); if(m)return m[1];
  m=s.match(/\/file\/d\/([a-zA-Z0-9_-]+)/); if(m)return m[1];
  m=s.match(/\/(?:document|spreadsheets|presentation)\/d\/([a-zA-Z0-9_-]+)/); if(m)return m[1];
  m=s.match(/[?&]id=([a-zA-Z0-9_-]+)/); if(m)return m[1];
  return '';
}
function popupItemFromDriveUrl(url,name,mimeType){
  return {
    id: driveIdFromUrl(url),
    name: name || 'Tài liệu',
    type: 'file',
    mimeType: mimeType || '',
    url: url || ''
  };
}
function openDriveFilePopup(url,name,mimeType){

  if(!item.id && !item.url){ alert('Không có đường dẫn file Drive để xem.'); return; }

}

async function apiDriveListFolder(folderId){
  // Ưu tiên action mới; thêm alias để tránh lệch tên action giữa HTML và Code.gs.
  const actions=['driveListFolder','getDriveFolderItems','getDriveFolder','listDriveFolder'];
  let lastErr=null;
  for(const act of actions){
    try{ return await api(act,{folderId:folderId}); }
    catch(e){
      lastErr=e;
      const msg=String((e&&e.message)||e||'');
      if(!msg.toLowerCase().includes('action không hợp lệ') && !msg.toLowerCase().includes('action khong hop le')) throw e;
    }
  }
  throw lastErr || new Error('Apps Script chưa có action driveListFolder.');
}

async function drivePopupFolderLoad(folderId,title){
  const body=document.getElementById('driveFolderPopupBody');

  if(titleEl)titleEl.textContent='📁 '+(title||'Thư mục tài liệu');

  try{
    const res=await apiDriveListFolder(folderId);
    const folder=res.folder||{id:folderId,name:title||'Thư mục tài liệu'};
    if(titleEl)titleEl.textContent='📁 '+(folder.name||title||'Thư mục tài liệu');
    APP.popupDriveFolderItems=res.items||[];
    if(body){
      body.innerHTML=drivePopupFolderRender(APP.popupDriveFolderItems, folder.name||'Thư mục tài liệu');

  }

function drivePopupFolderRender(items,title){
  items=Array.isArray(items)?items:[];
  const folders=items.filter(x=>x.type==='folder'||x.mimeType==='application/vnd.google-apps.folder');
  const files=items.filter(x=>!(x.type==='folder'||x.mimeType==='application/vnd.google-apps.folder'));
  const sorted=[...folders,...files];
  return `<div class="library-browser" style="width:100%;height:100%;background:#f7f9fc">
    <div class="library-statusbar"><span>${esc(title||'Thư mục')}: <b>${sorted.length}</b> mục</span><span class="muted">Bấm file để xem trong popup</span></div>
    ${sorted.length?`<div class="library-grid">${sorted.map(libraryItemCard).join('')}</div>`:'<div class="library-empty">Thư mục chưa có file.</div>'}
  </div>`;
}
function drivePopupFolderClick(ev){

  const type=btn.getAttribute('data-type')||'';
  const item=(APP.popupDriveFolderItems||[]).find(x=>String(x.id)===String(id));
  if(!item)return;
  if(type==='folder')drivePopupFolderLoad(item.id,item.name||'Thư mục tài liệu');
  else libraryShowFilePopup(item);
}
function libraryFindItemById(id){

function weekRange(d){
  const x=new Date(d.getFullYear(),d.getMonth(),d.getDate());
  const day=x.getDay()||7;const start=new Date(x);start.setDate(x.getDate()-day+1);start.setHours(0,0,0,0);
  const end=new Date(start);end.setDate(start.getDate()+6);end.setHours(23,59,59,999);
  return[start,end];
}

    applyCalendarFilters(false);return;
  }
  if(scope==='ALL'&&!APP.loadedAll){
    $('calList').innerHTML='<div class="loading"><div class="spin"></div><span>Đang tải toàn bộ lịch...</span></div>';
    try{const res=await api('getMeetings',{showPast:true,limit:5000});APP.meetings=res.meetings||[];APP.loadedAll=true;
      const _td2=new Date();_td2.setHours(0,0,0,0);
      const _fm2=APP.meetings.filter(m=>{const e=parseIsoDate(m.ngayKetThuc||m.ngayBatDau);return e&&e>=_td2;});
      $('navMeetCount').textContent=_fm2.length;
      const _bb=$('bnMeetBadge');if(_bb)_bb.textContent=_fm2.length;}
    catch(e){alert(e.message);}
  }
  applyCalendarFilters(false);
}
function setCalendarKind(kind){APP.filters.kind=kind;renderCalendar()}
function applyCalendarFilters(read=true){
  if(read){
    const activeId=document.activeElement?document.activeElement.id:'';
    if(activeId==='calKwM')APP.filters.kw=($('calKwM')?.value||'').trim();
    else if(activeId==='calKw')APP.filters.kw=($('calKw')?.value||'').trim();
    else APP.filters.kw=(APP.filters.kw||'').trim();
    APP.filters.leader=$('calLeader')?.value||APP.filters.leader||'all';
    APP.filters.scope=$('calScope')?.value||APP.filters.scope;
  }
  const f=APP.filters;
  const today=new Date();today.setHours(0,0,0,0);
  const[wStart,wEnd]=weekRange(today);
  const mStart=new Date(today.getFullYear(),today.getMonth(),1);
  const mEnd=new Date(today.getFullYear(),today.getMonth()+1,0,23,59,59,999);
  const yStart=new Date(today.getFullYear(),0,1);
  const yEnd=new Date(today.getFullYear(),11,31,23,59,59,999);
  // Dùng allMeetings cho tuần/tháng/năm/toàn bộ (cần lịch đã qua)
  const srcMeetings = (f.scope==='CURRENT') ? APP.meetings : (APP.allMeetings||APP.meetings);
  // Nếu chưa có allMeetings và cần lịch đã qua, load ngầm
  if(f.scope!=='CURRENT' && !APP.allMeetings && !APP._loadingAll){
    APP._loadingAll=true;
    api('getMeetings',{showPast:true,limit:5000}).then(res=>{
      APP.allMeetings=res.meetings||[];
      APP._loadingAll=false;
      applyCalendarFilters(false);
    }).catch(()=>{APP._loadingAll=false;});
    if($('calCount'))$('calCount').textContent='Đang tải...';
  }
  let arr=srcMeetings.filter(m=>{
    const s=parseIsoDate(m.ngayBatDau),e=parseIsoDate(m.ngayKetThuc||m.ngayBatDau)||s;
    if(f.scope==='CURRENT'&&e&&e<today)return false;
    if(f.scope==='WEEK'&&(!s||!e||e<wStart||s>wEnd))return false;
    if(f.scope==='MONTH'&&(!s||!e||s>mEnd||e<mStart))return false;
    if(f.scope==='YEAR'&&(!s||!e||s>yEnd||e<yStart))return false;
    const isGB=isGiaoBanMeeting(m);
    if(f.kind==='TRUC_BAN'&&!isGB)return false;
    if(f.kind==='HOP'&&isGB)return false;
    // f.kind==='ALL': hiển thị tất cả
    if(f.leader!=='all'&&!matchLeaderExact(m,f.leader))return false;
    if(f.kw){const hay=`${m.meetingId||''} ${m.noiDung||''} ${m.thanhPhan||''} ${m.diaDiem||''} ${m.chuTri||''} ${m.ghiChu||''} ${m.soVanBan||''}`;if(!smartMatch(hay,f.kw))return false;}
    return true;
  });
  if($('calCount'))$('calCount').textContent=`${arr.length} lịch · ${scopeLabel(f.scope)}`;
  if($('calList'))$('calList').innerHTML=meetingCards(arr);
}
function scopeLabel(v){return({CURRENT:'Từ hôm nay',ALL:'Toàn bộ',WEEK:'Tuần này',MONTH:'Tháng này',YEAR:'Năm nay'}[v]||v)}
function dateVNShort(iso){if(!iso)return'';var s=String(iso).trim();var m1=s.match(/^([0-9]{4})-([0-9]{1,2})-([0-9]{1,2})/);if(m1)return Number(m1[3])+'/'+(+m1[2])+'/'+m1[1];var m2=s.match(/^([0-9]{1,2})\/([0-9]{1,2})\/([0-9]{4})/);if(m2)return Number(m2[1])+'/'+(+m2[2])+'/'+m2[3];try{var dt=new Date(s);if(!isNaN(dt.getTime()))return dt.getDate()+'/'+(dt.getMonth()+1)+'/'+dt.getFullYear();}catch(e){}return s;}
function weekdayLabel(m){if(m.thu)return m.thu;const dt=parseIsoDate(m.ngayBatDau);if(!dt)return'';return['Chủ Nhật','Thứ Hai','Thứ Ba','Thứ Tư','Thứ Năm','Thứ Sáu','Thứ Bảy'][dt.getDay()]}
function timeRange(m){return`${esc(m.gioBatDau||'')}${m.gioKetThuc?'–'+esc(m.gioKetThuc):''}`}
function isGiaoBanMeeting(m){return m.loaiLich==='TRUC_BAN';}
function isToday(m){
  const today=new Date();const s=parseIsoDate(m.ngayBatDau);const e=parseIsoDate(m.ngayKetThuc||m.ngayBatDau)||s;
  if(!s)return false;
  today.setHours(0,0,0,0);
  return s<=today&&e>=today;
}
function meetingCards(arr,compact){
  if(!arr||!arr.length)return'<div class="empty">Không có lịch phù hợp.</div>';
  return'<div class="cards">'+arr.map(m=>{
    const thu=weekdayLabel(m);
    const isWE=(thu==='Thứ Bảy'||thu==='Chủ Nhật');
    const isTd=isToday(m);
    const dateText=dateVNShort(m.ngayHienThi||m.ngayBatDau);
    return`<div class="meeting-card${isGiaoBanMeeting(m)?' truc':''}">
      <div class="m-top">
        <div class="m-badges">
          <span class="pill mono">${esc(m.meetingId)}</span>
          <span class="pill type-${esc(m.loaiLich)}">${esc(typeLabel(m.loaiLich))}</span>
        </div>
        <div class="m-dateline">
          <span class="date-pill${isWE?' weekend':''}${isTd?' today':''}">${esc(dateText)}</span>
          <span class="date-pill${isWE?' weekend':''}">${esc(thu)}</span>

        </div>
      </div>

      <div class="m-meta">

        ${m.chuTri?`<div class="m-meta-row"><span class="label">👤 Chủ trì</span><span>${esc(m.chuTri)}</span></div>`:''}
        ${m.thanhPhan&&!compact?`<div class="m-meta-row"><span class="label">👥 Thành phần</span><span>${esc(m.thanhPhan)}</span></div>`:''}
        ${m.ghiChu&&!compact?`<div class="m-meta-row"><span class="label">📝 Ghi chú</span><span>${esc(m.ghiChu)}</span></div>`:''}
        ${m.fileCount>0 ? (m.fileCount===1 && m.firstFileUrl ? `<div class="m-meta-row"><span class="label">📎 Tài liệu</span><button type="button" class="btn xs primary" onclick='openDriveFilePopup(${jss(m.firstFileUrl)},${jss('Tài liệu '+m.meetingId)},${jss('')})'>1 file</button></div>` : (m.folderId||m.linkFolder ? `<div class="m-meta-row"><span class="label">📎 Tài liệu</span><button type="button" class="btn xs primary" onclick='openDriveFolderPopup(${jss(m.folderId||m.linkFolder)},${jss('Thư mục tài liệu '+m.meetingId)})'>${m.fileCount} file</button></div>` : `<div class="m-meta-row"><span class="label">📎 Tài liệu</span><span style="font-weight:700">${m.fileCount} file</span><span class="muted" style="font-size:.76rem;margin-left:4px">(chưa có link Drive)</span></div>`)) : `<div class="m-meta-row"><span class="label">📎 Tài liệu</span><span class="muted">0 file</span></div>`}
      </div>

        ${hasRole(ROLE_EDIT)?`<button class="btn primary sm" onclick="openMeetingForm('${esc(m.meetingId)}')">✏️ Sửa</button>`:''}
      </div>

}
