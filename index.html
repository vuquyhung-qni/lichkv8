          ${(m.folderId||m.linkFolder)?`<div class="m-meta-row"><span class="label" style="min-width:120px">📁 Thư mục</span><button type="button" class="btn xs primary" onclick='openDriveFolderPopup(${jss(m.folderId||m.linkFolder)},${jss('Thư mục tài liệu '+m.meetingId)})'>Mở trong web app</button></div>`:''}
        </div>
      </div>
      <div class="sp"></div>
      <div class="panel" style="box-shadow:none;border-color:var(--border2)">
        <div class="panel-h"><h3>📎 Tài liệu</h3></div>
        <div class="panel-b">${fileList(res.files)}${res.canUpload?uploadBox(id):''}</div>
      </div>
      <div class="sp"></div>
      <div class="panel" style="box-shadow:none;border-color:var(--border2)">
        <div class="panel-h"><h3>📜 Nhật ký</h3></div>
        <div class="panel-b" style="font-size:.83rem">${logList(res.logs)}</div>
      </div>`;
    setupDrop(id);
  }catch(e){$('modalBody').innerHTML=`<div class="msg err">${esc(e.message)}</div>`}
}
function fileList(files){
  if(!files||!files.length)return'<div class="empty">Chưa có tài liệu.</div>';
  return files.map((f,i)=>`<div class="file-row"><div><b>${esc(f.fileName)}</b><br><span class="muted" style="font-size:.78rem">${esc(f.fileType)} · V${esc(f.version)} · ${esc(f.uploadedBy)} · ${esc(dateVNShort(f.uploadedAt))}</span></div><button type="button" class="btn sm primary" onclick="openMeetingDetailFile(${i})">👁 Xem</button></div>`).join('')
}
function openMeetingDetailFile(index){
  const f=(APP.detailFiles||[])[Number(index)];
  if(!f){ alert('Không tìm thấy thông tin file trong chi tiết lịch.'); return; }
  openDriveFilePopup(f.fileUrl, f.fileName, f.mimeType);
}
function uploadBox(id){return`<div style="margin-top:12px"><div class="field"><label>Loại tài liệu</label><select id="upType">${fileTypeOptions('TAI_LIEU_HOP')}</select></div><div id="drop" class="drop">Kéo thả file vào đây hoặc bấm để chọn file<br><span class="muted" style="font-size:.76rem">PDF, Word, Excel, PowerPoint, ảnh, zip...</span><input id="fileInput" type="file" multiple class="hide"></div><div id="upMsg"></div></div>`}
function setupDrop(id){
  const d=$('drop');if(!d)return;const inp=$('fileInput');
  d.onclick=()=>inp.click();
  d.ondragover=e=>{e.preventDefault();d.classList.add('drag')};
  d.ondragleave=()=>d.classList.remove('drag');
  d.ondrop=e=>{e.preventDefault();d.classList.remove('drag');uploadFiles(id,e.dataTransfer.files)};
  inp.onchange=()=>uploadFiles(id,inp.files);
}
async function uploadFiles(id,files){
  if(!files||!files.length)return;const el=$('upMsg');msg(el,`Đang upload ${files.length} file...`);
  for(const file of files){const base64=await readFile(file);await api('uploadMeetingFile',{meetingId:id,fileType:$('upType').value,fileName:file.name,mimeType:file.type,base64});}
  msg(el,'Đã upload xong. Đang tải lại...','ok');await refreshAll();setTimeout(()=>openDetail(id),500);
}
function readFile(file){return new Promise((resolve,reject)=>{const r=new FileReader();r.onload=()=>resolve(r.result);r.onerror=reject;r.readAsDataURL(file)})}
function logList(logs){
  if(!logs||!logs.length)return'<div class="empty">Chưa có nhật ký.</div>';
  return logs.map(l=>`<div class="log-item"><b>${esc(l.action)}</b> · <span class="muted">${esc(l.byUser)}</span> · <span class="muted">${esc(l.atTime)}</span><br>${l.fieldName?`<span class="muted">${esc(l.fieldName)}${l.oldValue||l.newValue?': '+esc(l.oldValue)+' → '+esc(l.newValue):''}</span>`:''} ${l.note?'<span class="muted">· '+esc(l.note)+'</span>':''}</div>`).join('')
}

// ===== USERS =====
async function renderUsers(){
  if(!hasRole(ROLE_ADMIN)){$('screen-users').innerHTML='<div class="empty">Bạn không có quyền quản lý người dùng.</div>';return;}
  $('screen-users').innerHTML='<div class="loading"><div class="spin"></div><span>Đang tải...</span></div>';
  try{
    const res=await api('getUsers');
    APP._userList=res.users||[];
    renderUsersTable();
  }catch(e){$('screen-users').innerHTML=`<div class="msg err">${esc(e.message)}</div>`}
}

function renderUsersTable(){
  const users=APP._userList||[];
  const activeId=document.activeElement?document.activeElement.id:'';
  const caret=(activeId==='uKw'&&document.activeElement)?document.activeElement.selectionStart:null;
  const uf=APP._userFilters||{};
  const kw=(activeId==='uKw'?($('uKw')?.value||''):(uf.kw??($('uKw')?.value||''))).trim();
  const roleF=(activeId==='uRoleF'?($('uRoleF')?.value||'all'):(uf.roleF??($('uRoleF')?.value||'all')));
  const statusF=(activeId==='uStatusF'?($('uStatusF')?.value||'all'):(uf.statusF??($('uStatusF')?.value||'all')));
  APP._userFilters={kw,roleF,statusF};
  const filtered=users.map((u,idx)=>({u,idx})).filter(({u})=>{
    if(kw&&!smartMatch(`${u.username||''} ${u.fullname||''} ${u.donVi||''} ${u.email||''} ${u.chucvu||''} ${u.role||''}`,kw))return false;
    if(roleF!=='all'&&u.role!==roleF)return false;
    if(statusF!=='all'&&u.status!==statusF)return false;
    return true;
  });
  const isSA=APP.user.role==='SuperAdmin';
  const roleColors={'SuperAdmin':'#7c3aed','Admin':'#1d4ed8','LanhDaoCucChi':'#0369a1','LanhDaoPhong':'#0891b2','Lanhdaophong':'#0891b2','Thuky':'#059669','Viewer':'#64748b'};
  $('screen-users').innerHTML=`
    <div class="panel">
      <div class="panel-h" style="flex-wrap:wrap;gap:8px">
        <h3>👥 Người dùng (${filtered.length}/${users.length})</h3>
        ${isSA?'<button class="btn primary sm" onclick="openUserForm()">＋ Thêm user</button>':''}
      </div>
      <div class="panel-b">
        <div class="toolbar" style="margin-bottom:12px">
          <input id="uKw" placeholder="Tìm thông minh: tên, tài khoản, đơn vị..." value="${esc(kw)}" oninput="APP._userFilters=APP._userFilters||{};APP._userFilters.kw=this.value;renderUsersTable()" style="min-width:200px">
          <select id="uRoleF" onchange="APP._userFilters=APP._userFilters||{};APP._userFilters.roleF=this.value;renderUsersTable()">
            <option value="all" ${roleF==='all'?'selected':''}>Tất cả vai trò</option>
            <option value="SuperAdmin" ${roleF==='SuperAdmin'?'selected':''}>SuperAdmin</option>
            <option value="Admin" ${roleF==='Admin'?'selected':''}>Admin</option>
            <option value="LanhDaoCucChi" ${roleF==='LanhDaoCucChi'?'selected':''}>Lãnh đạo Chi cục</option>
            <option value="LanhDaoPhong" ${roleF==='LanhDaoPhong'?'selected':''}>Lãnh đạo Phòng</option>
            <option value="Thuky" ${roleF==='Thuky'?'selected':''}>Thư ký</option>
            <option value="Viewer" ${roleF==='Viewer'?'selected':''}>Viewer</option>
          </select>
          <select id="uStatusF" onchange="APP._userFilters=APP._userFilters||{};APP._userFilters.statusF=this.value;renderUsersTable()">
            <option value="all" ${statusF==='all'?'selected':''}>Tất cả trạng thái</option>
            <option value="Active" ${statusF==='Active'?'selected':''}>Đang hoạt động</option>
            <option value="Inactive" ${statusF==='Inactive'?'selected':''}>Đã khoá</option>
          </select>
          <button class="btn sm" onclick="APP._userFilters={kw:'',roleF:'all',statusF:'all'};renderUsersTable()">↺ Xóa lọc</button>
        </div>
        <div class="table-wrap"><table class="tbl">
          <thead><tr><th>#</th><th>Tài khoản</th><th>Họ tên</th><th>Vai trò</th><th>Đơn vị</th><th>Chức vụ</th><th>Trạng thái</th><th></th></tr></thead>
          <tbody>${filtered.map(({u,idx},i)=>`<tr>
            <td class="muted" style="font-size:.78rem">${i+1}</td>
            <td class="mono" style="font-weight:700">${esc(u.username)}</td>
            <td>${esc(u.fullname)}</td>
            <td><span class="role-badge" style="background:${roleColors[u.role]||'#64748b'}1a;color:${roleColors[u.role]||'#64748b'}">${esc(u.role)}</span></td>
            <td style="font-size:.83rem">${esc(u.donVi)}</td>
            <td style="font-size:.83rem">${esc(u.chucvu||'')}</td>
            <td><span class="pill ${u.status==='Active'?'status-PUBLISHED':'status-CANCELLED'}">${u.status==='Active'?'Hoạt động':'Đã khoá'}</span></td>
            <td style="white-space:nowrap">
              <button class="btn xs" onclick="openUserDetail(${idx})">👁</button>
              ${isSA?`<button class="btn primary xs" onclick="openUserForm(APP._userList[${idx}])">✏️</button>`:''}
              ${isSA&&u.username!==APP.user.username?`<button class="btn xs ${u.status==='Active'?'warn':'ok'}" onclick="toggleUserStatus(${idx})">${u.status==='Active'?'🔒':'🔓'}</button>`:''}
              ${isSA&&u.isDefaultPass?'<span title="Đang dùng MK mặc định" style="font-size:.9rem">⚠️</span>':''}
            </td>
          </tr>`).join('')}</tbody>
        </table></div>
      </div>
    </div>`;
  if(activeId==='uKw'){
    const inp=$('uKw');
    if(inp){inp.focus(); const pos=caret==null?inp.value.length:caret; try{inp.setSelectionRange(pos,pos)}catch(e){}}
  }
}

function openUserDetail(idx){
  const u=APP._userList[idx];
  if(!u)return;
  showModal(`<h3>👤 ${esc(u.fullname||u.username)}</h3>`,`
    <div class="panel" style="box-shadow:none;border-color:var(--border2)">
      <div class="panel-b" style="display:grid;gap:8px">
        <div class="m-meta-row"><span class="label" style="min-width:120px">Tài khoản</span><span class="mono bold">${esc(u.username)}</span></div>
        <div class="m-meta-row"><span class="label" style="min-width:120px">Họ tên</span><b>${esc(u.fullname)}</b></div>
        <div class="m-meta-row"><span class="label" style="min-width:120px">Vai trò</span><span class="role-badge">${esc(u.role)}</span></div>
        <div class="m-meta-row"><span class="label" style="min-width:120px">Chức vụ</span>${esc(u.chucvu||'—')}</div>
        <div class="m-meta-row"><span class="label" style="min-width:120px">Đơn vị</span>${esc(u.donVi||'—')}</div>
        <div class="m-meta-row"><span class="label" style="min-width:120px">Email</span>${esc(u.email||'—')}</div>
        <div class="m-meta-row"><span class="label" style="min-width:120px">Trạng thái</span><span class="pill ${u.status==='Active'?'status-PUBLISHED':'status-CANCELLED'}">${u.status==='Active'?'Hoạt động':'Đã khoá'}</span></div>
        <div class="m-meta-row"><span class="label" style="min-width:120px">MK mặc định</span>${u.isDefaultPass?'<span style="color:#d97706">⚠️ Chưa đổi</span>':'<span style="color:#16a34a">✓ Đã đổi</span>'}</div>
      </div>
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:14px">
      <button class="btn" onclick="closeModal()">Đóng</button>
      ${APP.user.role==='SuperAdmin'?`<button class="btn primary" onclick="closeModal();openUserForm(APP._userList[${idx}])">✏️ Sửa</button>`:''}
    </div>`);
}

async function toggleUserStatus(idx){
  const u=APP._userList[idx];
  if(!u)return;
  const newStatus=u.status==='Active'?'Inactive':'Active';
  const label=newStatus==='Active'?'mở khoá':'khoá';
  if(!confirm(`Xác nhận ${label} tài khoản "${u.username}"?`))return;
  try{
    await api('saveUser',{form:{userId:u.userId||u.id,username:u.username,fullname:u.fullname,role:u.role,scope:u.scope,status:newStatus,chucvu:u.chucvu,donVi:u.donVi,email:u.email}});
    await renderUsers();
  }catch(e){alert(e.message);}
}
function openUserForm(u={}){
  const isEdit=!!u.username;
  const ROLES=['SuperAdmin','Admin','LanhDaoCucChi','LanhDaoPhong','Thuky','Viewer'];
  const roleOpts=ROLES.map(r=>`<option value="${r}"${(u.role||'Viewer')===r?' selected':''}>${r==='LanhDaoCucChi'?'Lãnh đạo Chi cục':r==='LanhDaoPhong'?'Lãnh đạo Phòng':r==='Thuky'?'Thư ký':r}</option>`).join('');
  showModal(`<h3>${isEdit?'✏️ Sửa: '+esc(u.username):'➕ Thêm người dùng mới'}</h3>`,
  `<div class="form-grid">
    <div class="field"><label>Tài khoản ${isEdit?'(không đổi được)':''}</label><input id="uUsername" value="${esc(u.username||'')}" ${isEdit?'readonly style="background:var(--bg2)"':'placeholder="Nhập tên đăng nhập"'}></div>
    <div class="field"><label>Họ và tên</label><input id="uFull" value="${esc(u.fullname||'')}" placeholder="Nguyễn Văn A"></div>
    <div class="field"><label>Mật khẩu ${isEdit?'(để trống = không đổi)':'mới'}</label><input id="uPass" type="password" placeholder="${isEdit?'Để trống nếu không đổi':'Nhập mật khẩu'}"></div>
    <div class="field"><label>Vai trò</label><select id="uRole2">${roleOpts}</select></div>
    <div class="field"><label>Chức vụ</label><input id="uChucvu" value="${esc(u.chucvu||'')}" placeholder="Chi cục trưởng, Phó CCT..."></div>
    <div class="field"><label>Đơn vị</label><input id="uDonvi" value="${esc(u.donVi||'')}" placeholder="VP, CNTT, NV..."></div>
    <div class="field"><label>Email</label><input id="uEmail" type="email" value="${esc(u.email||'')}" placeholder="example@customs.gov.vn"></div>
    <div class="field"><label>Trạng thái</label><select id="uStatus">
      <option value="Active"${(u.status||'Active')==='Active'?' selected':''}>✅ Đang hoạt động</option>
      <option value="Inactive"${u.status==='Inactive'?' selected':''}>🔒 Đã khoá</option>
    </select></div>
    <div class="field"><label>Scope</label><select id="uScope">${options('SCOPE_LIST',u.scope||'VIEW_ALL')}</select></div>
    <div id="userFormMsg" class="full"></div>
  </div>
  <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px;flex-wrap:wrap">
    <button class="btn" onclick="closeModal()">Đóng</button>
    <button class="btn primary" onclick="saveUser('${esc(u.userId||u.id||'')}')">💾 ${isEdit?'Cập nhật':'Tạo tài khoản'}</button>
  </div>`);
}
async function saveUser(userId){
  const username=$('uUsername').value.trim();
  const fullname=$('uFull').value.trim();
  if(!username){msg($('userFormMsg'),'Vui lòng nhập tài khoản.','err');return;}
  if(!fullname){msg($('userFormMsg'),'Vui lòng nhập họ tên.','err');return;}
  const form={userId,username,fullname,password:$('uPass').value,role:$('uRole2').value,scope:$('uScope').value,status:$('uStatus').value,chucvu:$('uChucvu').value,donVi:$('uDonvi').value,email:$('uEmail').value};
  msg($('userFormMsg'),'Đang lưu...');
  try{
    await api('saveUser',{form});
    closeModal();
    await renderUsers();
  }catch(e){msg($('userFormMsg'),e.message,'err');}
}

// ===== MODAL =====
function openChangePassword(){
  showModal('<h3>🔑 Đổi mật khẩu</h3>',`
    <div class="form-grid" style="grid-template-columns:1fr">
      <div class="field">
        <label>Mật khẩu hiện tại</label>
        <input id="cpOld" type="password" placeholder="Nhập mật khẩu hiện tại">
      </div>
      <div class="field">
        <label>Mật khẩu mới</label>
        <input id="cpNew" type="password" placeholder="Tối thiểu 6 ký tự">
      </div>
      <div class="field">
        <label>Xác nhận mật khẩu mới</label>
        <input id="cpNew2" type="password" placeholder="Nhập lại mật khẩu mới">
      </div>
      <div id="cpMsg"></div>
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:14px">
      <button class="btn" onclick="closeModal()">Đóng</button>
      <button class="btn primary" onclick="saveChangePassword()">💾 Đổi mật khẩu</button>
    </div>`);
  setTimeout(()=>{ const el=document.getElementById('cpOld'); if(el)el.focus(); },100);
}

async function saveChangePassword(){
  const oldPw=document.getElementById('cpOld').value;
  const newPw=document.getElementById('cpNew').value;
  const newPw2=document.getElementById('cpNew2').value;
  const msgEl=document.getElementById('cpMsg');
  if(!oldPw||!newPw||!newPw2){ msg(msgEl,'Vui lòng nhập đầy đủ thông tin.','err'); return; }
  if(newPw.length<6){ msg(msgEl,'Mật khẩu mới phải có ít nhất 6 ký tự.','err'); return; }
  if(newPw!==newPw2){ msg(msgEl,'Mật khẩu mới không khớp.','err'); return; }
  if(oldPw===newPw){ msg(msgEl,'Mật khẩu mới phải khác mật khẩu cũ.','err'); return; }
  msg(msgEl,'Đang xử lý...');
  try{
    await api('changePassword',{oldPassword:oldPw,newPassword:newPw});
    msg(msgEl,'✅ Đổi mật khẩu thành công!','ok');
    setTimeout(()=>closeModal(),1500);
  }catch(e){
    msg(msgEl,e.message,'err');
  }
}

function showModal(title,body){
  $('modal').innerHTML=`<div class="modal-card"><div class="modal-h">${title}<button class="modal-close" onclick="closeModal()">✕</button></div><div id="modalBody" class="modal-b">${body}</div></div>`;
  $('modal').classList.remove('hide');
}
function closeModal(){APP.detailFiles=[];$('modal').classList.add('hide');$('modal').innerHTML=''}
</script>
