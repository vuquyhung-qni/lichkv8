<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Quản lý lịch công tác HQKV8</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #0b1f45;
      --navy2: #13336b;
      --blue: #1556c8;
      --blue2: #2d78ef;
      --blue3: #5a9af5;
      --gold: #d4a017;
      --gold2: #f0bf3a;
      --bg: #f0f4fb;
      --bg2: #e8eef9;
      --card: #fff;
      --text: #0f1e38;
      --text2: #3a4d6b;
      --muted: #6b7fa3;
      --border: #d4ddf0;
      --border2: #e4ecf8;
      --red: #c53030;
      --green: #15803d;
      --orange: #c2560c;
      --sidebar-w: 268px;
      --shadow-sm: 0 2px 8px rgba(11,31,69,.08);
      --shadow: 0 8px 24px rgba(11,31,69,.12);
      --shadow-lg: 0 20px 56px rgba(11,31,69,.18);
      --r: 14px;
      --r-sm: 10px;
      --r-xs: 7px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: "Be Vietnam Pro", "Segoe UI", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
    }
    button, input, select, textarea { font: inherit; }
    button { cursor: pointer; }
    a { color: var(--blue); text-decoration: none; }

    .hide { display: none !important; }
    .muted { color: var(--muted); }
    .mono { font-family: "JetBrains Mono", Consolas, monospace; font-size: .82em; }
    .nowrap { white-space: nowrap; }
    .bold { font-weight: 700; }

    /* ===== SCROLLBAR ===== */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

    /* ===== LOGIN ===== */
    .login-wrap {
      min-height: 100svh;
      display: grid;
      place-items: center;
      padding: 20px;
      background: linear-gradient(145deg, #071530 0%, #0d2960 45%, #1040a0 80%, #0d2960 100%);
      position: relative;
      overflow: hidden;
    }
    .login-wrap::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 60% 50% at 70% 30%, rgba(45,120,239,.22) 0%, transparent 70%),
                  radial-gradient(ellipse 40% 60% at 10% 80%, rgba(212,160,23,.12) 0%, transparent 60%);
      pointer-events: none;
    }
    .login-wrap::after {
      content: '';
      position: absolute;
      width: 500px; height: 500px;
      border: 1px solid rgba(255,255,255,.06);
      border-radius: 50%;
      top: -100px; right: -100px;
      pointer-events: none;
    }
    .login-card {
      width: min(420px, 100%);
      background: rgba(255,255,255,.97);
      border-radius: 22px;
      box-shadow: 0 32px 80px rgba(0,0,0,.35), 0 0 0 1px rgba(255,255,255,.15);
      overflow: hidden;
      position: relative;
      z-index: 1;
      animation: fadeUp .45s ease;
    }
    @keyframes fadeUp { from { opacity:0; transform:translateY(20px) } to { opacity:1; transform:none } }
    .login-banner {
      padding: 30px 28px 22px;
      background: linear-gradient(135deg, #0b1f45 0%, #1556c8 100%);
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .login-banner::after {
      content: '';
      position: absolute;
      width: 200px; height: 200px;
      border-radius: 50%;
      background: rgba(255,255,255,.05);
      top: -60px; right: -40px;
    }
    .login-logo {
      width: 82px; height: 82px;
      object-fit: contain;
      display: block;
      margin: 0 auto 14px;
      filter: drop-shadow(0 4px 14px rgba(0,0,0,.35));
      position: relative;
      z-index: 1;
    }
    .login-banner .line1 {
      font-size: .82rem;
      font-weight: 600;
      color: rgba(255,255,255,.85);
      text-transform: uppercase;
      letter-spacing: .8px;
      margin: 0 0 3px;
      position: relative;
      z-index: 1;
    }
    .login-banner .line2 {
      font-size: .82rem;
      font-weight: 700;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: .5px;
      margin: 0 0 10px;
      position: relative;
      z-index: 1;
      line-height: 1.35;
    }
    .login-banner .line3 {
      font-size: 1.23rem;
      font-weight: 800;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: .6px;
      line-height: 1.3;
      position: relative;
      z-index: 1;
      margin: 0;
      text-shadow: 0 2px 10px rgba(0,0,0,.3);
    }
    .login-divider {
      height: 3px;
      background: linear-gradient(90deg, var(--gold) 0%, var(--gold2) 50%, var(--gold) 100%);
    }
    .login-body { padding: 26px 28px 30px; }
    .field { margin-bottom: 16px; }
    .field label {
      display: block;
      font-size: .72rem;
      font-weight: 700;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: .5px;
      margin-bottom: 7px;
    }
    .field input, .field select, .field textarea {
      width: 100%;
      border: 1.5px solid var(--border);
      border-radius: var(--r-sm);
      padding: 11px 13px;
      background: #fafbff;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
      color: var(--text);
    }
    .field textarea { min-height: 80px; resize: vertical; }
    .field input:focus, .field select:focus, .field textarea:focus {
      border-color: var(--blue2);
      box-shadow: 0 0 0 3px rgba(45,120,239,.14);
      background: #fff;
    }
    .field input[readonly] { background: var(--bg2); color: var(--muted); }
    .field .hint { font-size: .72rem; color: var(--muted); margin-top: 5px; }

    /* ===== BUTTONS ===== */
    .btn {
      border: none;
      border-radius: var(--r-sm);
      padding: 10px 16px;
      font-weight: 600;
      font-size: .88rem;
      background: var(--bg2);
      color: var(--text2);
      transition: all .18s;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      white-space: nowrap;
    }
    .btn:hover { filter: brightness(.96); transform: translateY(-1px); }
    .btn:active { transform: none; filter: brightness(.9); }
    .btn.primary {
      background: linear-gradient(135deg, var(--blue), var(--blue2));
      color: #fff;
      box-shadow: 0 6px 18px rgba(21,86,200,.28);
    }
    .btn.primary:hover { box-shadow: 0 8px 22px rgba(21,86,200,.36); }
    .btn.danger { background: #fee2e2; color: #991b1b; }
    .btn.warn { background: #fff7ed; color: #9a3412; }
    .btn.ok { background: #dcfce7; color: #166534; }
    .btn.ghost { background: transparent; border: 1.5px solid var(--border); }
    .btn.sm { padding: 7px 11px; font-size: .8rem; border-radius: var(--r-xs); }
    .btn.xs { padding: 4px 8px; font-size: .75rem; border-radius: 6px; }
    .btn.full { width: 100%; justify-content: center; }
    .btn:disabled { opacity: .55; pointer-events: none; }

    /* ===== MESSAGES ===== */
    .msg {
      margin-top: 12px;
      padding: 10px 14px;
      border-radius: var(--r-sm);
      background: var(--bg2);
      color: var(--text2);
      font-size: .88rem;
      border-left: 3px solid var(--border);
    }
    .msg.err { background: #fef2f2; color: #991b1b; border-color: var(--red); }
    .msg.ok { background: #f0fdf4; color: #166534; border-color: var(--green); }

    /* ===== LAYOUT ===== */
    .layout { display: flex; min-height: 100svh; }

    /* ===== SIDEBAR ===== */
    .sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      background: linear-gradient(180deg, #0b1f45 0%, #13336b 60%, #0b1f45 100%);
      color: #fff;
      position: sticky;
      top: 0;
      height: 100svh;
      display: flex;
      flex-direction: column;
      z-index: 30;
      border-right: 1px solid rgba(255,255,255,.06);
    }
    .brand {
      padding: 20px 18px 16px;
      border-bottom: 1px solid rgba(255,255,255,.1);
      display: flex;
      align-items: center;
      gap: 11px;
    }
    .brand-logo { width: 40px; height: 40px; object-fit: contain; flex-shrink: 0; filter: drop-shadow(0 2px 6px rgba(0,0,0,.3)); }
    .brand-text h2 {
      font-size: .8rem;
      font-weight: 800;
      line-height: 1.3;
      text-transform: uppercase;
      letter-spacing: .3px;
    }
    .brand-text p { font-size: .68rem; color: rgba(255,255,255,.55); margin-top: 2px; }
    .nav { padding: 14px 10px; flex: 1; overflow-y: auto; }
    .nav-section-label {
      font-size: .65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .8px;
      color: rgba(255,255,255,.38);
      padding: 10px 10px 5px;
    }
    .nav-btn {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 10px;
      border: none;
      background: transparent;
      color: rgba(255,255,255,.7);
      padding: 10px 12px;
      border-radius: var(--r-sm);
      text-align: left;
      font-weight: 500;
      font-size: .88rem;
      margin-bottom: 2px;
      transition: all .18s;
      position: relative;
    }
    .nav-btn .nav-icon { font-size: 1.1rem; width: 22px; text-align: center; flex-shrink: 0; }
    .nav-btn .nav-label { flex: 1; }
    .nav-btn .badge {
      background: var(--gold2);
      color: #0b1f45;
      border-radius: 99px;
      padding: 1px 7px;
      font-size: .7rem;
      font-weight: 800;
    }
    .nav-btn:hover { background: rgba(255,255,255,.1); color: #fff; }
    .nav-btn.active {
      background: rgba(255,255,255,.15);
      color: #fff;
      font-weight: 700;
    }
    .nav-btn.active::before {
      content: '';
      position: absolute;
      left: 0; top: 50%;
      transform: translateY(-50%);
      width: 3px; height: 60%;
      background: var(--gold2);
      border-radius: 0 3px 3px 0;
    }
    .side-foot {
      padding: 14px 10px;
      border-top: 1px solid rgba(255,255,255,.1);
    }
    .userbox {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,.08);
      border-radius: var(--r-sm);
      padding: 10px 12px;
      cursor: default;
    }
    .avatar {
      width: 34px; height: 34px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      color: #0b1f45;
      font-weight: 900;
      font-size: .85rem;
      flex-shrink: 0;
    }
    .userbox-info b { display: block; font-size: .84rem; line-height: 1.2; }
    .userbox-info span { font-size: .7rem; color: rgba(255,255,255,.6); }
    .side-actions { display: flex; gap: 6px; margin-top: 10px; }
    .side-actions button {
      flex: 1;
      border: none;
      border-radius: var(--r-xs);
      padding: 7px;
      font-size: .75rem;
      font-weight: 600;
      background: rgba(255,255,255,.1);
      color: rgba(255,255,255,.8);
      transition: background .18s;
    }
    .side-actions button:hover { background: rgba(255,255,255,.18); color: #fff; }
    .side-actions button.logout-btn { background: rgba(220,50,50,.2); color: #fca5a5; }
    .side-actions button.logout-btn:hover { background: rgba(220,50,50,.35); }

    /* ===== MAIN ===== */
    .main { flex: 1; min-width: 0; display: flex; flex-direction: column; }

    /* ===== TOPBAR ===== */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(240,244,251,.92);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border2);
      padding: 12px 22px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .hamb {
      display: none;
      border: 1.5px solid var(--border);
      background: #fff;
      border-radius: var(--r-xs);
      padding: 7px 9px;
      font-size: 1rem;
      color: var(--text2);
    }
    .page-title h1 {
      font-size: .98rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: var(--navy);
    }
    .page-title p { font-size: .75rem; color: var(--muted); margin-top: 1px; }
    .topbar-actions { margin-left: auto; display: flex; gap: 7px; align-items: center; }

    /* ===== CONTENT ===== */
    .content { padding: 20px 22px; flex: 1; }

    /* ===== STAT CARDS ===== */
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
    .stat-card {
      background: #fff;
      border-radius: var(--r);
      padding: 16px 18px;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border2);
      position: relative;
      overflow: hidden;
      transition: transform .18s, box-shadow .18s;
    }
    .stat-card:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
    .stat-active { box-shadow: 0 0 0 2.5px var(--blue2), var(--shadow) !important; transform: translateY(-2px); }
    .th-active,.td-active { background: #eff6ff !important; color: var(--blue) !important; font-weight:800; }
    .stat-card::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--blue), var(--blue2));
    }
    .stat-card:nth-child(2)::after { background: linear-gradient(90deg, #7c3aed, #a855f7); }
    .stat-card:nth-child(3)::after { background: linear-gradient(90deg, #059669, #10b981); }
    .stat-card:nth-child(4)::after { background: linear-gradient(90deg, var(--gold), var(--gold2)); }
    .stat-k { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
    .stat-v { font-size: 2rem; font-weight: 900; color: var(--navy); line-height: 1.1; margin: 5px 0 3px; }
    .stat-sub { font-size: .72rem; color: var(--muted); }

    /* ===== PANEL ===== */
    .panel {
      background: #fff;
      border-radius: var(--r);
      border: 1px solid var(--border2);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
    }
    .panel-h {
      padding: 13px 18px;
      border-bottom: 1px solid var(--border2);
      display: flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(90deg, #fafbff, #fff);
    }
    .panel-h h3 { font-size: .92rem; font-weight: 700; color: var(--navy); flex: 1; }
    .panel-b { padding: 16px 18px; }

    /* ===== FILTERBAR ===== */
    .filterbar {
      display: flex;
      gap: 9px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }
    .search-wrap {
      display: flex;
      flex: 1;
      min-width: 240px;
      border: 1.5px solid var(--border);
      border-radius: var(--r-sm);
      background: #fff;
      overflow: hidden;
      transition: border-color .2s, box-shadow .2s;
    }
    .search-wrap:focus-within {
      border-color: var(--blue2);
      box-shadow: 0 0 0 3px rgba(45,120,239,.12);
    }
    .search-wrap input {
      flex: 1;
      border: none;
      padding: 9px 12px;
      background: transparent;
      outline: none;
      color: var(--text);
      font-size: .88rem;
    }
    .search-wrap button {
      border: none;
      background: linear-gradient(135deg, var(--blue), var(--blue2));
      color: #fff;
      padding: 9px 14px;
      font-weight: 600;
      font-size: .84rem;
    }
    .select-field {
      border: 1.5px solid var(--border);
      border-radius: var(--r-sm);
      padding: 9px 10px;
      background: #fff;
      color: var(--text);
      font-weight: 600;
      outline: none;
      cursor: pointer;
      min-width: 140px;
      transition: border-color .2s;
    }
    .select-field:focus { border-color: var(--blue2); }

    /* ===== SEGMENT ===== */
    .seg {
      display: inline-flex;
      gap: 3px;
      background: var(--bg2);
      border: 1.5px solid var(--border);
      border-radius: var(--r-sm);
      padding: 3px;
    }
    .seg-btn {
      border: none;
      border-radius: var(--r-xs);
      padding: 7px 14px;
      font-weight: 600;
      font-size: .82rem;
      background: transparent;
      color: var(--text2);
      transition: all .18s;
    }
    .seg-btn.active {
      background: linear-gradient(135deg, var(--blue), var(--blue2));
      color: #fff;
      box-shadow: 0 4px 12px rgba(21,86,200,.25);
    }
    .filter-note { font-size: .78rem; color: var(--muted); }

    /* ===== MEETING CARDS ===== */
    .cards { display: grid; gap: 11px; }
    .meeting-card {
      background: #fff;
      border: 1px solid var(--border2);
      border-left: 4px solid var(--blue);
      border-radius: var(--r);
      padding: 15px 16px;
      box-shadow: var(--shadow-sm);
      transition: all .18s;
      position: relative;
    }
    .meeting-card:hover { transform: translateY(-2px); box-shadow: var(--shadow); border-left-color: var(--blue2); }
    .meeting-card.truc { border-left-color: var(--gold); }
    .meeting-card.truc:hover { border-left-color: var(--gold2); }
    .m-top { display: flex; justify-content: space-between; gap: 8px; align-items: flex-start; flex-wrap: wrap; }
    .m-badges { display: flex; gap: 4px; flex-wrap: wrap; }
    .m-dateline { display: flex; gap: 5px; flex-wrap: wrap; align-items: center; }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      border-radius: 99px;
      background: #eef4ff;
      color: #1556c8;
      font-weight: 700;
      padding: 3px 9px;
      font-size: .73rem;
    }
    .pill.mono { font-family: "JetBrains Mono", monospace; background: #f1f5f9; color: var(--text2); }
    .pill.status-DRAFT { background: #f1f5f9; color: #475569; }
    .pill.status-PUBLISHED { background: #dcfce7; color: #166534; }
    .pill.status-CANCELLED { background: #fee2e2; color: #991b1b; }
    .pill.status-COMPLETED { background: #e0f2fe; color: #0369a1; }
    .pill.type-TRUC_BAN { background: #fff7ed; color: #9a3412; }
    .date-pill {
      display: inline-flex;
      align-items: center;
      border-radius: 6px;
      background: var(--bg2);
      color: var(--text2);
      font-weight: 700;
      padding: 4px 10px;
      font-size: .76rem;
      gap: 4px;
    }
    .date-pill.time { background: #dbeafe; color: #1e40af; }
    .date-pill.weekend { background: #fdecea; color: #b91c1c; }
    .date-pill.today { background: #dcfce7; color: #15803d; }
    .m-title {
      font-weight: 700;
      color: var(--navy);
      line-height: 1.4;
      margin: 10px 0 8px;
      font-size: .95rem;
    }
    .m-meta { display: grid; gap: 4px; }
    .m-meta-row { display: flex; align-items: baseline; gap: 6px; font-size: .85rem; color: var(--text2); }
    .m-meta-row .label { color: var(--muted); font-size: .76rem; flex-shrink: 0; }
    .m-actions { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border2); }

    /* ===== TABLE ===== */
    .table-wrap { overflow-x: auto; border-radius: var(--r-xs); }
    .tbl { width: 100%; border-collapse: collapse; }
    .tbl th, .tbl td {
      border-bottom: 1px solid var(--border2);
      padding: 10px 12px;
      text-align: left;
      vertical-align: top;
    }
    .tbl th {
      background: var(--bg2);
      color: var(--muted);
      font-size: .72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .4px;
      white-space: nowrap;
    }
    .tbl tr:last-child td { border-bottom: none; }
    .tbl tr:hover td { background: #fafbff; }
    .leader-table td:nth-child(n+2), .leader-table th:nth-child(n+2) { text-align: center; }
    .barline { height: 6px; background: var(--bg2); border-radius: 99px; overflow: hidden; min-width: 80px; }
    .barline span { display: block; height: 100%; background: linear-gradient(90deg, var(--blue), var(--blue2)); border-radius: 99px; }

    /* ===== MODAL ===== */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(7,15,38,.55);
      backdrop-filter: blur(4px);
      display: grid;
      place-items: center;
      padding: 16px;
      z-index: 100;
    }
    .modal-card {
      width: min(1000px, 100%);
      max-height: 92svh;
      overflow: auto;
      background: #fff;
      border-radius: 18px;
      box-shadow: var(--shadow-lg);
    }
    .modal-h {
      position: sticky;
      top: 0;
      background: #fff;
      border-bottom: 1px solid var(--border2);
      padding: 15px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 2;
    }
    .modal-h h3 { font-size: .98rem; font-weight: 700; color: var(--navy); flex: 1; }
    .modal-close {
      border: none;
      background: var(--bg2);
      border-radius: var(--r-xs);
      padding: 7px 10px;
      font-size: .9rem;
      color: var(--text2);
      transition: background .18s;
    }
    .modal-close:hover { background: #fee2e2; color: var(--red); }
    .modal-b { padding: 20px; }
    .form-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 13px; }
    .form-grid .full { grid-column: 1 / -1; }
    .form-grid .half { grid-column: span 2; }

    /* ===== DROPZONE ===== */
    .drop {
      border: 2px dashed var(--border);
      border-radius: var(--r-sm);
      padding: 20px;
      text-align: center;
      background: var(--bg2);
      color: var(--muted);
      font-size: .85rem;
      cursor: pointer;
      transition: all .18s;
      margin-top: 8px;
    }
    .drop:hover, .drop.drag { border-color: var(--blue2); background: #eff6ff; color: var(--blue); }
    .file-row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      border: 1px solid var(--border2);
      border-radius: var(--r-xs);
      padding: 10px 13px;
      margin-bottom: 6px;
      background: var(--bg2);
    }
    .queued-list { margin-top: 8px; display: grid; gap: 5px; }
    .queued-file {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
      border: 1px solid var(--border2);
      background: var(--bg2);
      border-radius: var(--r-xs);
      padding: 7px 10px;
      font-size: .83rem;
    }
    .queued-file button {
      border: none;
      background: #fee2e2;
      color: #991b1b;
      border-radius: 5px;
      padding: 3px 8px;
      font-size: .76rem;
    }

    /* ===== LOG ===== */
    .log-item {
      border-left: 3px solid #dbeafe;
      padding: 8px 12px;
      background: #f8fafc;
      margin-bottom: 6px;
      border-radius: 0 var(--r-xs) var(--r-xs) 0;
      font-size: .83rem;
    }

    /* ===== MISC ===== */
    .empty { text-align: center; color: var(--muted); padding: 30px 20px; font-size: .88rem; }
    .loading { display: grid; place-items: center; padding: 40px; color: var(--muted); gap: 6px; }
    .spin {
      width: 30px; height: 30px;
      border: 3px solid var(--border2);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin .9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg) } }
    .sp { height: 14px; }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

    /* ===== TOOLBAR ===== */
    .toolbar { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 12px; }
    .toolbar input, .toolbar select {
      border: 1.5px solid var(--border);
      border-radius: var(--r-sm);
      padding: 8px 11px;
      background: #fff;
      outline: none;
      flex: 1;
      min-width: 180px;
      transition: border-color .2s;
    }
    .toolbar input:focus, .toolbar select:focus { border-color: var(--blue2); }

    /* ===== ROLE BADGE ===== */
    .role-badge {
      font-size: .65rem;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 4px;
      background: rgba(45,120,239,.12);
      color: var(--blue);
      text-transform: uppercase;
    }

    /* ===== BOTTOM NAV (mobile only) ===== */
    .bottom-nav { display: none; }
    .app-ready .bottom-nav { display: none; }

    /* ===== SIDEBAR OVERLAY ===== */
    .sidebar-overlay { display: none; }

    /* ===== RESPONSIVE ===== */
    @media (min-width: 769px) {
      .cal-filter-row { display: none !important; }
      .desktop-filters { display: flex !important; gap: 9px; flex-wrap: wrap; align-items: center; margin-bottom: 12px; }
    }
    @media (max-width: 1024px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .form-grid { grid-template-columns: 1fr 1fr; }
      .two-col { grid-template-columns: 1fr; }
    }

    @media (max-width: 768px) {
      :root { --sidebar-w: 270px; }
      .sidebar {
        position: fixed;
        left: 0; top: 0; bottom: 0;
        transform: translateX(-100%);
        transition: transform .25s cubic-bezier(.4,0,.2,1);
        box-shadow: none;
      }
      .sidebar.open {
        transform: translateX(0);
        box-shadow: 6px 0 24px rgba(0,0,0,.25);
      }
      .sidebar-overlay {
        display: block;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,.4);
        z-index: 29;
        opacity: 0;
        pointer-events: none;
        transition: opacity .25s;
      }
      .sidebar-overlay.show { opacity: 1; pointer-events: auto; }
      .main { width: 100%; }
      .hamb { display: flex; }
      .topbar-actions { display: none; }
      .content { padding: 14px; padding-bottom: 80px; }
      .topbar { padding: 10px 14px; }

      /* Bottom navigation bar */
      .bottom-nav {
        display: flex;
        position: fixed;
        bottom: 0; left: 0; right: 0;
        z-index: 40;
        background: #fff;
        border-top: 1px solid var(--border);
        box-shadow: 0 -4px 20px rgba(11,31,69,.1);
        padding: 6px 0 max(6px, env(safe-area-inset-bottom));
      }
      .bn-item {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2px;
        border: none;
        background: transparent;
        color: var(--muted);
        padding: 6px 2px;
        font-size: .64rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: .3px;
        transition: color .18s;
        position: relative;
      }
      .bn-item .bn-icon { font-size: 1.22rem; }
      .bn-item .bn-badge {
        position: absolute;
        top: 3px;
        right: 50%;
        transform: translateX(10px);
        background: var(--blue);
        color: #fff;
        border-radius: 99px;
        font-size: .6rem;
        font-weight: 800;
        padding: 1px 5px;
        min-width: 16px;
        text-align: center;
      }
      .bn-item.active {
        color: var(--blue);
      }
      .bn-item.active::after {
        content: '';
        position: absolute;
        top: 0; left: 50%;
        transform: translateX(-50%);
        width: 36px; height: 3px;
        background: var(--blue);
        border-radius: 0 0 3px 3px;
      }
      .bn-item.bn-logout { color: #dc2626; }
      /* Mobile: ẩn pill loại lịch, trạng thái, Hôm nay */
      @media (max-width: 768px) {
        .pill.type-HOP,.pill.type-TRUC_BAN,.pill.type-CONG_TAC,
        .pill[class*="type-"],
        .pill[class*="status-"],
        .pill-today { display: none !important; }
      }
      .bn-item.bn-logout:active { background: #fee2e2; }
      /* Mobile calendar filter */
      .cal-search-row { display:flex; gap:8px; align-items:center; margin-bottom:8px; }
      .cal-filter-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:7px; margin-bottom:10px; }
      .cycle-btn {
        border: 1.5px solid var(--border);
        border-radius: var(--r-sm);
        padding: 9px 6px;
        font-size: .78rem;
        font-weight: 700;
        background: #fff;
        color: var(--text2);
        text-align: center;
        transition: all .18s;
        letter-spacing: .3px;
      }
      .cycle-btn.active {
        background: linear-gradient(135deg,var(--blue),var(--blue2));
        color: #fff;
        border-color: transparent;
        box-shadow: 0 4px 12px rgba(21,86,200,.25);
      }
      .cycle-btn:active { filter: brightness(.92); }
      .stats-grid { grid-template-columns: 1fr 1fr; }
      .form-grid { grid-template-columns: 1fr; }
      .filterbar { gap: 7px; }
      .search-wrap { min-width: 0; }
      .seg { width: 100%; }
      .seg-btn { flex: 1; }
    }

    @media (max-width: 480px) {
      .stats-grid { grid-template-columns: 1fr 1fr; gap: 9px; }
      .stat-card { padding: 13px 14px; }
      .stat-v { font-size: 1.6rem; }
      .m-top { display: block; }
      .m-dateline { justify-content: flex-start; margin-top: 6px; }
      .login-body { padding: 20px 20px 26px; }
    }
  </style>
</head>

<script>
const APP = {
  token:'', user:null, setup:{}, depts:[], usersLite:[], meetings:[],
  dashboard:null, currentScreen:'calendar', dashPeriod:'week',
  filters:{kw:'', leader:'all', scope:'CURRENT', kind:'HOP'},
  loadedAll:false, pendingFormFiles:[]
};

// ===== PHÂN QUYỀN =====
// Sửa lịch: Lãnh đạo Chi cục, Lãnh đạo Phòng, Thư ký (ngoài Admin/SuperAdmin)
const ROLE_EDIT = ['SuperAdmin','Admin','LanhDaoCucChi','LanhDaoPhong','Thuky','Lanhdaophong','lanhdaophong','LanhdaoPhong','LanhDaocucchi','Lanhdaocucchi','LanhDaoTruong','LanhdaoTruong','lanhdao'];
const ROLE_ADMIN = ['SuperAdmin','Admin'];
const ROLE_EDIT_LABEL = {
  SuperAdmin:'Quản trị cao cấp', Admin:'Quản trị', Thuky:'Thư ký',
  LanhDaoCucChi:'Lãnh đạo Chi cục', LanhDaoPhong:'Lãnh đạo Phòng', Viewer:'Xem',
  Lanhdaophong:'Lãnh đạo Phòng', LanhdaoPhong:'Lãnh đạo Phòng', LanhDaocucchi:'Lãnh đạo Chi cục', Lanhdaocucchi:'Lãnh đạo Chi cục', LanhDaoTruong:'Lãnh đạo', LanhdaoTruong:'Lãnh đạo', lanhdao:'Lãnh đạo'
};

function $(id){return document.getElementById(id)}
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
function hasRole(list){
  if(!APP.user)return false;
  if(list.includes(APP.user.role))return true;
  // Fallback: khớp không phân biệt hoa thường
  const r=APP.user.role.toLowerCase();
  return list.some(x=>x.toLowerCase()===r);
}
function msg(el,text,type){el.innerHTML=text?`<div class="msg ${type||''}">${esc(text)}</div>`:''}
const GAS_URL = "https://script.google.com/macros/s/AKfycbyrF-AVo-uoGpXHwKIWGPsH534FdyD73q4pibABqybBfTGPK_BL2SV313-JSkmd3qh2/exec";

function api(action, payload={}) {
  payload.action = action;
  payload.token = APP.token;

  // Upload file (base64 lớn) → dùng fetch POST để tránh giới hạn URL
  if (action === 'uploadMeetingFile') {
    return fetch(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(payload),
      redirect: 'follow'
    })
    .then(r => r.text())
    .then(text => {
      // GAS POST trả JSON trực tiếp
      try { const res = JSON.parse(text); if (!res || res.ok === false) throw new Error((res && res.msg) || 'Lỗi upload'); return res; }
      catch(e) { throw new Error('Lỗi parse response: ' + text.slice(0,100)); }
    });
  }

  // Các action thông thường → dùng JSONP (GET)
  return new Promise((resolve, reject) => {
    const cbName = '_cb_' + Date.now() + Math.random().toString(36).slice(2);
    const script = document.createElement('script');
    const timer = setTimeout(() => {
      cleanup();
      reject(new Error('Timeout — GAS không phản hồi'));
    }, 25000);
    function cleanup() {
      clearTimeout(timer);
      try { delete window[cbName]; } catch(e) {}
      if (script && script.parentNode) script.parentNode.removeChild(script);
    }
    window[cbName] = function(res) {
      cleanup();
      if (!res || res.ok === false) reject(new Error((res && res.msg) || 'Lỗi không xác định'));
      else resolve(res);
    };
    const qs = new URLSearchParams({ data: JSON.stringify(payload), callback: cbName });
    script.src = GAS_URL + '?' + qs.toString();
    script.async = true;
    script.onerror = function() {
      cleanup();
      reject(new Error('Không kết nối được GAS — kiểm tra Access=Anyone'));
    };
    (document.head || document.body).appendChild(script);
  });
}

function dateVN(iso){
  if(!iso)return'';
  const s=String(iso).trim();
  const m1=s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
  if(m1)return`${m1[3].padStart(2,'0')}/${m1[2].padStart(2,'0')}/${m1[1]}`;
  try{const dt=new Date(s);if(!isNaN(dt.getTime()))return`${String(dt.getDate()).padStart(2,'0')}/${String(dt.getMonth()+1).padStart(2,'0')}/${dt.getFullYear()}`;}catch(e){}
  return iso;
}
function setupItems(keys){for(const k of keys){if(APP.setup[k]&&APP.setup[k].length)return APP.setup[k];}return[]}
function typeLabel(v){const a=setupItems(['MEETING_TYPE','LOAI_LICH']).find(x=>x.value===v);return a?a.label:v}
function statusLabel(v){const a=setupItems(['MEETING_STATUS','TRANG_THAI_LICH']).find(x=>x.value===v);return a?a.label:v}
function optionsAny(keys,selected){return setupItems(keys).map(x=>`<option value="${esc(x.value)}"${x.value===selected?' selected':''}>${esc(x.label)}</option>`).join('')}
function normText(s){return String(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/đ/g,'d').replace(/[^a-z0-9]+/g,' ').trim()}
function initials(name){return(name||'U').split(/\s+/).slice(-2).map(x=>x[0]).join('').toUpperCase()||'U'}

// ===== INIT =====
window.addEventListener('load',()=>{
  APP.token=localStorage.getItem('lct_token')||'';
  const u=localStorage.getItem('lct_user');
  if(APP.token&&u){APP.user=JSON.parse(u);showApp();refreshAll().catch(()=>showLogin())}
  $('lgPass').addEventListener('keydown',e=>{if(e.key==='Enter')login()})
});

async function login(){
  const username=$('lgUser').value.trim(),password=$('lgPass').value;
  msg($('loginMsg'),'Đang đăng nhập...');
  try{
    const res=await api('login',{username,password,token:''});
    APP.token=res.token;APP.user=res.user;
    localStorage.setItem('lct_token',APP.token);
    localStorage.setItem('lct_user',JSON.stringify(APP.user));
    showApp();await refreshAll();
    if(res.user.isDefaultPass)alert('Tài khoản đang dùng mật khẩu mặc định. Vui lòng đổi mật khẩu.')
  }catch(e){msg($('loginMsg'),e.message+' (F12→Console để xem chi tiết)','err')}
}

function showApp(){
  $('login').classList.add('hide');
  $('app').classList.remove('hide');
  $('uName').textContent=APP.user.fullname||APP.user.username;
  $('uRole').textContent=ROLE_EDIT_LABEL[APP.user.role]||APP.user.role;
  $('avatar').textContent=initials(APP.user.fullname||APP.user.username);
  // Quản lý người dùng: chỉ Admin/SuperAdmin
  if(!hasRole(ROLE_ADMIN)){
    const nu=$('navUsers'); if(nu)nu.style.display='none';
    const bu=$('bnUsers'); if(bu)bu.style.display='none';
  }
  // Danh mục: chỉ Admin/SuperAdmin
  if(!hasRole(ROLE_ADMIN)){
    const ns=$('navSettings'); if(ns)ns.style.display='none';
    const nas=$('navAdminSection'); if(nas)nas.style.display='none';
    const bs=$('bnSettings'); if(bs)bs.style.display='none';
  }
}
function showLogin(){
  $('app').classList.add('hide');
  $('login').classList.remove('hide');
  localStorage.removeItem('lct_token');
  localStorage.removeItem('lct_user');
  APP.token='';APP.user=null;
}
async function logout(){try{await api('logout')}catch(e){}showLogin()}

function toggleSide(){
  const s=$('sidebar'),o=$('sidebarOverlay');
  s.classList.toggle('open');
  o.classList.toggle('show',s.classList.contains('open'));
}
function closeSide(){$('sidebar').classList.remove('open');$('sidebarOverlay').classList.remove('show')}

function go(screen){
  APP.currentScreen=screen;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.screen===screen));
  document.querySelectorAll('.bn-item').forEach(b=>b.classList.toggle('active',b.dataset.screen===screen));

  $('pageTitle').textContent=titles[screen]||'';

async function refreshAll(){
  setLoading();
  const res=await api('getBootstrap');
  APP.setup=res.setup||{};APP.depts=res.depts||[];
  APP.usersLite=res.usersLite||[];APP.dashboard=res.dashboard;
  APP.meetings=res.meetings||[];APP.loadedAll=false;

function setLoading(){
  ['screen-dashboard','screen-calendar','screen-manage','screen-users','screen-settings']
    .forEach(id=>$(id).innerHTML='<div class="loading"><div class="spin"></div><span>Đang tải...</span></div>');
}
function render(){renderDashboard();renderCalendar();renderManage();renderUsers();renderSettings();}

// ===== DASHBOARD =====
function renderDashboard(){
  const d=APP.dashboard||{};
  const now=new Date(); now.setHours(0,0,0,0);
  const[wStart,wEnd]=weekRange(now);
  const mStart=new Date(now.getFullYear(),now.getMonth(),1);
  const mEnd=new Date(now.getFullYear(),now.getMonth()+1,0,23,59,59,999);
  // Luôn dùng toàn bộ lịch cho dashboard (load ngầm nếu chưa có)
  const meetings=APP.allMeetings||APP.meetings||[];
  if(!APP.allMeetings && !APP._loadingAll){
    APP._loadingAll=true;
    api('getMeetings',{showPast:true,limit:5000}).then(res=>{
      APP.allMeetings=res.meetings||[];
      APP._loadingAll=false;
      renderDashboard();
    }).catch(()=>{APP._loadingAll=false;});
    // Hiển thị chú thích đang tải
  }
  const isFullData=!!APP.allMeetings;
  const nonTrucBan=meetings.filter(m=>m.loaiLich!=='TRUC_BAN'&&!String(m.noiDung||'').toLowerCase().includes('trực ban')&&!String(m.noiDung||'').toLowerCase().includes('giao ban'));
  const countWeek=nonTrucBan.filter(m=>{const s=parseIsoDate(m.ngayBatDau),e=parseIsoDate(m.ngayKetThuc||m.ngayBatDau)||s;return s&&e&&s<=wEnd&&e>=wStart;}).length;
  const countMonth=nonTrucBan.filter(m=>{const s=parseIsoDate(m.ngayBatDau),e=parseIsoDate(m.ngayKetThuc||m.ngayBatDau)||s;return s&&e&&s<=mEnd&&e>=mStart;}).length;
  const yStart=new Date(now.getFullYear(),0,1); const yEnd=new Date(now.getFullYear(),11,31,23,59,59,999);
  const countYear=nonTrucBan.filter(m=>{const s=parseIsoDate(m.ngayBatDau),e=parseIsoDate(m.ngayKetThuc||m.ngayBatDau)||s;return s&&e&&s<=yEnd&&e>=yStart;}).length;
  // Danh sách 4 lãnh đạo cố định theo thứ tự ưu tiên
  const LEADERS = [
    { name: 'Phạm Quốc Hưng',    display: 'Đ/c Phạm Quốc Hưng – Chi cục trưởng' },
    { name: 'Ngô Tùng Dương',    display: 'Đ/c Ngô Tùng Dương' },
    { name: 'Bùi Ngọc Lợi',      display: 'Đ/c Bùi Ngọc Lợi' },
    { name: 'Nguyễn Cảnh Thắng', display: 'Đ/c Nguyễn Cảnh Thắng' },
  ];
  // Hàm chuẩn hoá: bỏ dấu, bỏ prefix "đ/c", "c ", chữ thường
  function normName(s){
    return String(s||'').toLowerCase()
      .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
      .replace(/đ/g,'d')
      .replace(/^(d\/c|c)\s+/,'')
      .replace(/\s*[-–]\s*.*/,'')   // bỏ phần sau gạch ngang (chức danh)
      .replace(/\s+/g,' ').trim();
  }
  const leaderMap={};
  LEADERS.forEach(l=>{ leaderMap[l.name]={...l,week:0,month:0,year:0}; });
  nonTrucBan.forEach(m=>{
    const s=parseIsoDate(m.ngayBatDau),e=parseIsoDate(m.ngayKetThuc||m.ngayBatDau)||s;
    if(!s)return;
    const raw=[m.chuTri,m.lanhDaoLienQuan].join(',');
    const parts=raw.split(/[,;]+/).map(x=>x.trim()).filter(x=>x.length>1);
    const matched=new Set();
    parts.forEach(part=>{
      const pn=normName(part);
      LEADERS.forEach(l=>{
        if(matched.has(l.name))return;
        if(pn===normName(l.name)||pn.includes(normName(l.name))||normName(l.name).includes(pn)){
          matched.add(l.name);
          const inWeek=s<=wEnd&&e>=wStart;
          const inMonth=s<=mEnd&&e>=mStart;
          const inYear=s<=yEnd&&e>=yStart;
          if(inWeek)leaderMap[l.name].week++;
          if(inMonth)leaderMap[l.name].month++;
          if(inYear)leaderMap[l.name].year++;
        }
      });
    });
  });
  // Giữ đúng thứ tự 4 lãnh đạo, luôn hiển thị dù = 0
  const leaderRows=LEADERS.map(l=>leaderMap[l.name]);
  const maxYear=Math.max(1,...leaderRows.map(x=>x.year));
  $('screen-dashboard').innerHTML=`
    <div class="stats-grid">
      ${statCard('Hôm nay',d.today||0,'Lịch diễn ra hôm nay','','today')}
      ${statCard('Trong tuần',countWeek,'Lịch họp tuần này','','week')}
      ${statCard('Trong tháng',countMonth,'Lịch họp tháng '+String(now.getMonth()+1)+'/' +now.getFullYear(),'','month')}
      ${statCard('Trong năm',countYear,(isFullData?'':'⏳ ')+'Năm '+now.getFullYear(),'','year')}
    </div>
    <div class="sp"></div>
    <div class="stats-grid" style="grid-template-columns:repeat(4,1fr)">
      ${statCard('Tổng',d.total||0,'Tất cả lịch')}
      ${statCard('Đã duyệt',d.published||0,'Trạng thái PUBLISHED')}
      ${statCard('Nháp',d.draft||0,'Trạng thái DRAFT')}
      ${statCard('Đã hủy',d.cancelled||0,'Trạng thái CANCELLED')}
    </div>
    <div class="sp"></div>
    <div class="panel">
      <div class="panel-h"><h3>📊 Thống kê lãnh đạo tham dự / chủ trì</h3><span class="muted" style="font-size:.78rem">Tổng lượt tham dự (1 lịch có thể tính cho nhiều lãnh đạo)</span></div>
      <div class="panel-b">
        <div class="table-wrap">
          <table class="tbl leader-table">
            <thead><tr><th>Lãnh đạo</th><th class="${APP.dashPeriod==='week'?'th-active':''}">Tuần</th><th class="${APP.dashPeriod==='month'?'th-active':''}">Tháng</th><th class="${APP.dashPeriod==='year'||APP.dashPeriod==='today'?'th-active':''}">Năm</th><th style="text-align:left;min-width:100px">Tỷ trọng</th></tr></thead>
            <tbody>
              ${leaderRows.map(x=>`<tr>
                <td><b>${esc(x.display)}</b></td>
                <td>${x.week}</td><td>${x.month}</td>
                <td><b>${x.year}</b></td>
                <td><div class="barline"><span style="width:${Math.min(100,Math.round(x.year*100/maxYear))}%"></span></div></td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>
    </div>
    <div class="sp"></div>
    <div class="two-col">
      <div class="panel"><div class="panel-h"><h3>Theo loại lịch</h3></div><div class="panel-b">${miniCountTable(d.byType||{},typeLabel)}</div></div>
      <div class="panel"><div class="panel-h"><h3>Theo trạng thái</h3></div><div class="panel-b">${miniCountTable(d.byStatus||{},statusLabel)}</div></div>
    </div>`;
}
function statCard(k,v,sub,cls,period){
  const isActive=period&&APP.dashPeriod===period;
  return `<div class="stat-card${isActive?' stat-active':''}" ${period?`onclick="setDashPeriod('${period}')" style="cursor:pointer"`:''}>
    <div class="stat-k">${esc(k)}</div>
    <div class="stat-v">${esc(v)}</div>
    <div class="stat-sub">${esc(sub)}</div>
  </div>`;
}
function setDashPeriod(p){
  APP.dashPeriod=p;
  renderDashboard();
}
function miniCountTable(obj,labelFn){
  const rows=Object.keys(obj||{}).sort((a,b)=>(obj[b]||0)-(obj[a]||0));
  if(!rows.length)return'<div class="empty">Chưa có dữ liệu.</div>';
  return`<div class="table-wrap"><table class="tbl"><tbody>${rows.map(k=>`<tr><td>${esc(labelFn?labelFn(k):k)}</td><td style="text-align:right"><b>${obj[k]}</b></td></tr>`).join('')}</tbody></table></div>`;
}

// ===== CALENDAR =====
// Trạng thái các nút lọc tuần tự mobile
const LEADER_CYCLE = ['all','Hưng','Dương','Lợi','Thắng'];
const SCOPE_CYCLE  = ['CURRENT','WEEK','MONTH','YEAR'];
const KIND_CYCLE   = ['HOP','GIAO_BAN'];
const LEADER_LABELS = {all:'LĐCC', Hưng:'Đ/c Hưng', Dương:'Đ/c Dương', Lợi:'Đ/c Lợi', Thắng:'Đ/c Thắng'};
const SCOPE_LABELS  = {CURRENT:'THỜI GIAN', WEEK:'TUẦN', MONTH:'THÁNG', YEAR:'NĂM'};
const KIND_LABELS   = {HOP:'LỊCH HỌP', GIAO_BAN:'TRỰC BAN'};

function cycleLeader(){
  const idx=LEADER_CYCLE.indexOf(APP.filters.leader);
  APP.filters.leader=LEADER_CYCLE[(idx+1)%LEADER_CYCLE.length];
  updateCycleButtons(); applyCalendarFilters(false);
}
function cycleScope(){
  const idx=SCOPE_CYCLE.indexOf(APP.filters.scope);
  const next=SCOPE_CYCLE[(idx+1)%SCOPE_CYCLE.length];
  if(next==='YEAR'){APP.filters.scope='YEAR';updateCycleButtons();applyCalendarFilters(false);}
  else changeScope(next).then(()=>{updateCycleButtons();});
}
function cycleKind(){
  const idx=KIND_CYCLE.indexOf(APP.filters.kind);
  APP.filters.kind=KIND_CYCLE[(idx+1)%KIND_CYCLE.length];
  updateCycleButtons(); applyCalendarFilters(false);
}
function updateCycleButtons(){
  const bl=$('btnLeader'),bs=$('btnScope'),bk=$('btnKind');
  if(bl)bl.textContent=LEADER_LABELS[APP.filters.leader]||APP.filters.leader;
  if(bs)bs.textContent=SCOPE_LABELS[APP.filters.scope]||APP.filters.scope;
  if(bk)bk.textContent=KIND_LABELS[APP.filters.kind]||APP.filters.kind;
  // highlight active
  if(bl)bl.classList.toggle('active',APP.filters.leader!=='all');
  if(bs)bs.classList.toggle('active',APP.filters.scope!=='CURRENT');
  if(bk)bk.classList.toggle('active',APP.filters.kind!=='HOP');
}

function renderCalendar(){
  const f=APP.filters;
  $('screen-calendar').innerHTML=`
    <div class="cal-search-row">
      <div class="search-wrap" style="flex:1">
        <input id="calKw" placeholder="Tìm nội dung, địa điểm, chủ trì..." value="${esc(f.kw)}" onkeydown="if(event.key==='Enter')applyCalendarFilters()">

function leaderOptions(selected){
  return setupItems(['LEADER_LIST','LANH_DAO']).map(x=>{
    const label=String(x.label||x.value).replace(/^Đ\/c\s*/i,'').trim();
    return`<option value="${esc(label)}"${selected===label?' selected':''}>Đ/c ${esc(label)}</option>`;
  }).join('')
}
function weekRange(d){
  const x=new Date(d.getFullYear(),d.getMonth(),d.getDate());
  const day=x.getDay()||7;const start=new Date(x);start.setDate(x.getDate()-day+1);start.setHours(0,0,0,0);
  const end=new Date(start);end.setDate(start.getDate()+6);end.setHours(23,59,59,999);
  return[start,end];
}
function parseIsoDate(v){if(!v)return null;const[y,m,d]=String(v).split('-').map(Number);if(!y||!m||!d)return null;return new Date(y,m-1,d)}
async function changeScope(scope){
  APP.filters.scope=scope;
  if(scope==='YEAR'){applyCalendarFilters(false);return;}
  if(scope==='ALL'&&!APP.loadedAll){
    $('calList').innerHTML='<div class="loading"><div class="spin"></div><span>Đang tải toàn bộ lịch...</span></div>';
    try{const res=await api('getMeetings',{showPast:true,limit:5000});APP.meetings=res.meetings||[];APP.loadedAll=true;$('navMeetCount').textContent=APP.meetings.length;$('bnMeetBadge').textContent=APP.meetings.length;}
    catch(e){alert(e.message);}
  }
  applyCalendarFilters(false);
}
function setCalendarKind(kind){APP.filters.kind=kind;renderCalendar()}
function applyCalendarFilters(read=true){
  if(read){APP.filters.kw=($('calKw')?.value||'').trim().toLowerCase();APP.filters.leader=$('calLeader')?.value||'all';APP.filters.scope=$('calScope')?.value||APP.filters.scope;}
  const f=APP.filters;
  const today=new Date();today.setHours(0,0,0,0);
  const[wStart,wEnd]=weekRange(today);
  const mStart=new Date(today.getFullYear(),today.getMonth(),1);
  const mEnd=new Date(today.getFullYear(),today.getMonth()+1,0,23,59,59,999);
  const yStart=new Date(today.getFullYear(),0,1);
  const yEnd=new Date(today.getFullYear(),11,31,23,59,59,999);
  let arr=APP.meetings.filter(m=>{
    const s=parseIsoDate(m.ngayBatDau),e=parseIsoDate(m.ngayKetThuc||m.ngayBatDau)||s;
    if(f.scope==='CURRENT'&&e&&e<today)return false;
    if(f.scope==='WEEK'&&(!s||!e||e<wStart||s>wEnd))return false;
    if(f.scope==='MONTH'&&(!s||!e||s>mEnd||e<mStart))return false;
    if(f.scope==='YEAR'&&(!s||!e||s>yEnd||e<yStart))return false;
    const isGB=isGiaoBanMeeting(m);
    if(f.kind==='GIAO_BAN'&&!isGB)return false;
    if(f.kind==='HOP'&&isGB)return false;
    if(f.leader!=='all'){const hay=normText(`${m.lanhDaoLienQuan} ${m.chuTri} ${m.thanhPhan}`);if(!hay.includes(normText(f.leader)))return false;}
    if(f.kw){const hay=`${m.meetingId} ${m.noiDung} ${m.thanhPhan} ${m.diaDiem} ${m.chuTri} ${m.ghiChu} ${m.soVanBan}`.toLowerCase();if(!hay.includes(f.kw))return false;}
    return true;
  });
  if($('calCount'))$('calCount').textContent=`${arr.length} lịch · ${scopeLabel(f.scope)}`;
  if($('calList'))$('calList').innerHTML=meetingCards(arr);
}
function scopeLabel(v){return({CURRENT:'Từ hôm nay',ALL:'Toàn bộ',WEEK:'Tuần này',MONTH:'Tháng này',YEAR:'Năm nay'}[v]||v)}
function dateVNShort(iso){if(!iso)return'';var s=String(iso).trim();var m1=s.match(/^([0-9]{4})-([0-9]{1,2})-([0-9]{1,2})/);if(m1)return Number(m1[3])+'/'+(+m1[2])+'/'+m1[1];var m2=s.match(/^([0-9]{1,2})\/([0-9]{1,2})\/([0-9]{4})/);if(m2)return Number(m2[1])+'/'+(+m2[2])+'/'+m2[3];try{var dt=new Date(s);if(!isNaN(dt.getTime()))return dt.getDate()+'/'+(dt.getMonth()+1)+'/'+dt.getFullYear();}catch(e){}return s;}
function weekdayLabel(m){if(m.thu)return m.thu;const dt=parseIsoDate(m.ngayBatDau);if(!dt)return'';return['Chủ Nhật','Thứ Hai','Thứ Ba','Thứ Tư','Thứ Năm','Thứ Sáu','Thứ Bảy'][dt.getDay()]}
function timeRange(m){return`${esc(m.gioBatDau||'')}${m.gioKetThuc?'–'+esc(m.gioKetThuc):''}`}
function isGiaoBanMeeting(m){return m.loaiLich==='TRUC_BAN'||normText(m.noiDung).includes('giao ban')||normText(m.noiDung).includes('truc ban')}
function isToday(m){
  const today=new Date();const s=parseIsoDate(m.ngayBatDau);const e=parseIsoDate(m.ngayKetThuc||m.ngayBatDau)||s;
  if(!s)return false;
  today.setHours(0,0,0,0);
  return s<=today&&e>=today;
}
function meetingCards(arr,compact){
  if(!arr||!arr.length)return'<div class="empty">Không có lịch phù hợp.</div>';
  return'<div class="cards">'+arr.map(m=>{
    const thu=weekdayLabel(m);
    const isWE=(thu==='Thứ Bảy'||thu==='Chủ Nhật');
    const isTd=isToday(m);
    const dateText=dateVNShort(m.ngayHienThi||m.ngayBatDau);
    return`<div class="meeting-card${isGiaoBanMeeting(m)?' truc':''}">
      <div class="m-top">
        <div class="m-badges">
          <span class="pill mono">${esc(m.meetingId)}</span>
          <span class="pill type-${esc(m.loaiLich)}">${esc(typeLabel(m.loaiLich))}</span>
        </div>
        <div class="m-dateline">
          <span class="date-pill${isWE?' weekend':''}${isTd?' today':''}">${esc(dateText)}</span>
          <span class="date-pill${isWE?' weekend':''}">${esc(thu)}</span>
          <span class="date-pill time">⏰ ${timeRange(m)}</span>
        </div>
      </div>
      <div class="m-title">${esc(m.noiDung)}</div>
      <div class="m-meta">
        ${m.diaDiem?`<div class="m-meta-row"><span class="label">📍 Địa điểm</span><span>${esc(m.diaDiem)}</span></div>`:''}
        ${m.chuTri?`<div class="m-meta-row"><span class="label">👤 Chủ trì</span><span>${esc(m.chuTri)}</span></div>`:''}
        ${m.thanhPhan&&!compact?`<div class="m-meta-row"><span class="label">👥 Thành phần</span><span>${esc(m.thanhPhan)}</span></div>`:''}
        ${m.ghiChu&&!compact?`<div class="m-meta-row"><span class="label">📝 Ghi chú</span><span>${esc(m.ghiChu)}</span></div>`:''}
        ${m.linkFolder?`<div class="m-meta-row"><span class="label">📎 Tài liệu</span><a href="${esc(m.linkFolder)}" target="_blank" style="color:var(--blue);font-weight:700;text-decoration:none">${m.fileCount||0} file ↗</a></div>`:`<div class="m-meta-row"><span class="label">📎 Tài liệu</span><span>${m.fileCount||0} file</span></div>`}
      </div>
      <div class="m-actions">
        <button class="btn sm" onclick="openDetail('${esc(m.meetingId)}')">👁 Xem chi tiết</button>
        ${hasRole(ROLE_EDIT)?`<button class="btn primary sm" onclick="openMeetingForm('${esc(m.meetingId)}')">✏️ Sửa</button>`:''}
      </div>
    </div>`;
  }).join('')+'</div>';
}

      </div>
      <div class="sp"></div>
      <div class="panel" style="box-shadow:none;border-color:var(--border2)">
        <div class="panel-h"><h3>📜 Nhật ký</h3></div>
        <div class="panel-b" style="font-size:.83rem">${logList(res.logs)}</div>
      </div>`;
    setupDrop(id);
  }catch(e){$('modalBody').innerHTML=`<div class="msg err">${esc(e.message)}</div>`}
}
function fileList(files){
  if(!files||!files.length)return'<div class="empty">Chưa có tài liệu.</div>';
  return files.map(f=>`<div class="file-row"><div><b>${esc(f.fileName)}</b><br><span class="muted" style="font-size:.78rem">${esc(f.fileType)} · V${esc(f.version)} · ${esc(f.uploadedBy)} · ${esc(f.uploadedAt)}</span></div><a class="btn sm primary" href="${esc(f.fileUrl)}" target="_blank">↗ Mở</a></div>`).join('')
}
function uploadBox(id){return`<div style="margin-top:12px"><div class="field"><label>Loại tài liệu</label><select id="upType">${fileTypeOptions('TAI_LIEU_HOP')}</select></div><div id="drop" class="drop">Kéo thả file vào đây hoặc bấm để chọn file<br><span class="muted" style="font-size:.76rem">PDF, Word, Excel, PowerPoint, ảnh, zip...</span><input id="fileInput" type="file" multiple class="hide"></div><div id="upMsg"></div></div>`}
function setupDrop(id){
  const d=$('drop');if(!d)return;const inp=$('fileInput');
  d.onclick=()=>inp.click();
  d.ondragover=e=>{e.preventDefault();d.classList.add('drag')};
  d.ondragleave=()=>d.classList.remove('drag');
  d.ondrop=e=>{e.preventDefault();d.classList.remove('drag');uploadFiles(id,e.dataTransfer.files)};
  inp.onchange=()=>uploadFiles(id,inp.files);
}
async function uploadFiles(id,files){
  if(!files||!files.length)return;const el=$('upMsg');msg(el,`Đang upload ${files.length} file...`);
  for(const file of files){const base64=await readFile(file);await api('uploadMeetingFile',{meetingId:id,fileType:$('upType').value,fileName:file.name,mimeType:file.type,base64});}
  msg(el,'Đã upload xong. Đang tải lại...','ok');await refreshAll();setTimeout(()=>openDetail(id),500);
}
function readFile(file){return new Promise((resolve,reject)=>{const r=new FileReader();r.onload=()=>resolve(r.result);r.onerror=reject;r.readAsDataURL(file)})}
function logList(logs){
  if(!logs||!logs.length)return'<div class="empty">Chưa có nhật ký.</div>';
  return logs.map(l=>`<div class="log-item"><b>${esc(l.action)}</b> · <span class="muted">${esc(l.byUser)}</span> · <span class="muted">${esc(l.atTime)}</span><br>${l.fieldName?`<span class="muted">${esc(l.fieldName)}${l.oldValue||l.newValue?': '+esc(l.oldValue)+' → '+esc(l.newValue):''}</span>`:''} ${l.note?'<span class="muted">· '+esc(l.note)+'</span>':''}</div>`).join('')
}

// ===== USERS =====
async function renderUsers(){
  if(!hasRole(ROLE_ADMIN)){$('screen-users').innerHTML='<div class="empty">Bạn không có quyền quản lý người dùng.</div>';return;}
  $('screen-users').innerHTML='<div class="loading"><div class="spin"></div><span>Đang tải...</span></div>';
  try{
    const res=await api('getUsers');const users=res.users||[];
    $('screen-users').innerHTML=`<div class="panel">
      <div class="panel-h">
        <h3>👥 Danh sách người dùng</h3>
        ${APP.user.role==='SuperAdmin'?'<button class="btn primary sm" onclick="openUserForm()">＋ Thêm user</button>':''}
      </div>
      <div class="panel-b">
        <div class="table-wrap"><table class="tbl">
          <thead><tr><th>Tài khoản</th><th>Họ tên</th><th>Vai trò</th><th>Đơn vị</th><th>Trạng thái</th><th></th></tr></thead>
          <tbody>${users.map(u=>`<tr>
            <td class="mono">${esc(u.username)}</td>
            <td>${esc(u.fullname)}</td>
            <td><span class="role-badge">${esc(u.role)}</span></td>
            <td>${esc(u.donVi)}</td>
            <td><span class="pill ${u.status==='Active'?'status-PUBLISHED':'status-CANCELLED'}">${esc(u.status)}</span></td>
            <td>${APP.user.role==='SuperAdmin'?`<button class="btn xs" onclick='openUserForm(${JSON.stringify(u).replace(/'/g,"&#39;")})'>Sửa</button>`:''}</td>
          </tr>`).join('')}</tbody>
        </table></div>
      </div>
    </div>`;
  }catch(e){$('screen-users').innerHTML=`<div class="msg err">${esc(e.message)}</div>`}
}
function openUserForm(u={}){
  showModal(`<h3>${u.username?'✏️ Sửa người dùng':'➕ Thêm người dùng'}</h3>`,
  `<div class="form-grid">
    <div class="field"><label>Username</label><input id="uUsername" value="${esc(u.username||'')}"${u.username?' readonly':''}></div>
    <div class="field"><label>Họ tên</label><input id="uFull" value="${esc(u.fullname||'')}"></div>
    <div class="field"><label>Mật khẩu mới</label><input id="uPass" type="password" placeholder="Để trống nếu không đổi"></div>
    <div class="field"><label>Vai trò</label><select id="uRole2">${options('ROLE_LIST',u.role||'Viewer')}</select></div>
    <div class="field"><label>Scope</label><select id="uScope">${options('SCOPE_LIST',u.scope||'VIEW_ALL')}</select></div>
    <div class="field"><label>Trạng thái</label><select id="uStatus"><option${u.status==='Active'?' selected':''}>Active</option><option${u.status==='Inactive'?' selected':''}>Inactive</option></select></div>
    <div class="field"><label>Chức vụ</label><input id="uChucvu" value="${esc(u.chucvu||'')}"></div>
    <div class="field"><label>Đơn vị</label><input id="uDonvi" value="${esc(u.donVi||'')}"></div>
    <div class="field"><label>Email</label><input id="uEmail" value="${esc(u.email||'')}"></div>
  </div>
  <div style="text-align:right;margin-top:14px;display:flex;gap:8px;justify-content:flex-end">
    <button class="btn" onclick="closeModal()">Đóng</button>
    <button class="btn primary" onclick="saveUser('${esc(u.userId||'')}')">💾 Lưu</button>
  </div>`);
}
async function saveUser(userId){
  const form={userId,username:$('uUsername').value,fullname:$('uFull').value,password:$('uPass').value,role:$('uRole2').value,scope:$('uScope').value,status:$('uStatus').value,chucvu:$('uChucvu').value,donVi:$('uDonvi').value,email:$('uEmail').value};
  try{await api('saveUser',{form});closeModal();renderUsers();}catch(e){alert(e.message)}
}

// ===== MODAL =====
function openChangePassword(){
  showModal('<h3>🔑 Đổi mật khẩu</h3>',`
    <div class="form-grid" style="grid-template-columns:1fr">
      <div class="field">
        <label>Mật khẩu hiện tại</label>
        <input id="cpOld" type="password" placeholder="Nhập mật khẩu hiện tại">
      </div>
      <div class="field">
        <label>Mật khẩu mới</label>
        <input id="cpNew" type="password" placeholder="Tối thiểu 6 ký tự">
      </div>
      <div class="field">
        <label>Xác nhận mật khẩu mới</label>
        <input id="cpNew2" type="password" placeholder="Nhập lại mật khẩu mới">
      </div>
      <div id="cpMsg"></div>
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:14px">
      <button class="btn" onclick="closeModal()">Đóng</button>
      <button class="btn primary" onclick="saveChangePassword()">💾 Đổi mật khẩu</button>
    </div>`);
  setTimeout(()=>{ const el=document.getElementById('cpOld'); if(el)el.focus(); },100);
}

async function saveChangePassword(){
  const oldPw=document.getElementById('cpOld').value;
  const newPw=document.getElementById('cpNew').value;
  const newPw2=document.getElementById('cpNew2').value;
  const msgEl=document.getElementById('cpMsg');
  if(!oldPw||!newPw||!newPw2){ msg(msgEl,'Vui lòng nhập đầy đủ thông tin.','err'); return; }
  if(newPw.length<6){ msg(msgEl,'Mật khẩu mới phải có ít nhất 6 ký tự.','err'); return; }
  if(newPw!==newPw2){ msg(msgEl,'Mật khẩu mới không khớp.','err'); return; }
  if(oldPw===newPw){ msg(msgEl,'Mật khẩu mới phải khác mật khẩu cũ.','err'); return; }
  msg(msgEl,'Đang xử lý...');
  try{
    await api('changePassword',{oldPassword:oldPw,newPassword:newPw});
    msg(msgEl,'✅ Đổi mật khẩu thành công!','ok');
    setTimeout(()=>closeModal(),1500);
  }catch(e){
    msg(msgEl,e.message,'err');
  }
}

function showModal(title,body){
  $('modal').innerHTML=`<div class="modal-card"><div class="modal-h">${title}<button class="modal-close" onclick="closeModal()">✕</button></div><div id="modalBody" class="modal-b">${body}</div></div>`;
  $('modal').classList.remove('hide');
}
function closeModal(){$('modal').classList.add('hide');$('modal').innerHTML=''}
</script>
